    <script type="text/javascript">
        $('a.linked').attr('onmouseover', '');
        $('a.linked').attr('onmouseout', '');
        $('a.linked').popover({
            html: true,
            trigger: 'manual',
            content: function () {
                return $.ajax({
                    url: 'cvvhelp',
                    dataType: 'html',
                    async: false
                }).responseText;
            }
        }).click(function (e) {
            $(this).popover('toggle');
        });

        function PreCheckout()
        {
            switch ($("#SubmitButton").val())
            {
                case "CompleteFormButton":
                    {
                        if (validateTC())
                        {
                            $("#complete-form-btn").text('Processing...');
                            return true;
                        }
                        else
                            return false;
                    }
                case "CompleteButton":
                    {
                        if (validateTC())
                        {
                            $('#IsCompleteButtonSubmit').val('1');
                            $("#complete-btn").text('Processing...');
                            return true;
                        }
                        else
                            return false;
                    }
                case "CompleteBraintreeButton":
                    {
                        if (validateTC())
                        {
                            $("#complete-braintree-btn").text('Processing...');

                            // prevent double submits
                            $("#SubmitButton").val("CompleteBraintreeButtonSubmitted");

                            return handleBraintree();
                        }
                        else
                            return false;
                    }
                case "CompleteBraintreeButtonSubmitted":
                    {
                        // the braintree validation is done and button is already submitted
                        return true;
                    }
                default:
                    {
                        return false;
                    }
            }
        }
    </script>
