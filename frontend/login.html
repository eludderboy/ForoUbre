<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">🐄 Foro Ubre</div>
    <h2>Iniciar sesión</h2>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <div id="errorMsg" class="error-msg hidden"></div>
      <button type="submit" class="btn-auth" id="btnLogin">Entrar</button>
    </form>

    <p class="auth-switch">
      ¿No tienes cuenta? <a href="register.html">Regístrate</a>
    </p>
  </div>

  <script>
    // Redirigir si ya hay sesión
    if (localStorage.getItem("fu_token")) window.location.href = "index.html";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnLogin");
      const err = document.getElementById("errorMsg");
      err.classList.add("hidden");
      btn.textContent = "Entrando...";
      btn.disabled    = true;

      try {
        const res  = await fetch("/api/auth/login", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            email:    document.getElementById("email").value,
            password: document.getElementById("password").value
          })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.mensaje);

        localStorage.setItem("fu_token",  data.token);
        localStorage.setItem("fu_usuario", JSON.stringify(data.usuario));
        window.location.href = "index.html";

      } catch (error) {
        err.textContent = error.message;
        err.classList.remove("hidden");
        btn.textContent = "Entrar";
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
