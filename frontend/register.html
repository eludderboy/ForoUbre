<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Registro</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">🐄 Foro Ubre</div>
    <h2>Crear cuenta</h2>

    <form id="registerForm">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required/>
      </div>
      <div class="form-group">
        <label>@Handle</label>
        <div class="input-prefix">
          <span>@</span>
          <input type="text" id="handle" placeholder="tuhandle" required
                 pattern="[a-zA-Z0-9_]+" title="Solo letras, números y _"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required/>
      </div>
      <div class="form-group">
        <label>Contraseña <small>(mín. 6 caracteres)</small></label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6"/>
      </div>
      <div id="errorMsg" class="error-msg hidden"></div>
      <button type="submit" class="btn-auth" id="btnRegister">Crear cuenta</button>
    </form>

    <p class="auth-switch">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem("fu_token")) window.location.href = "index.html";

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnRegister");
      const err = document.getElementById("errorMsg");
      err.classList.add("hidden");
      btn.textContent = "Creando cuenta...";
      btn.disabled    = true;

      try {
        const res  = await fetch("/api/auth/register", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            nombre:   document.getElementById("nombre").value.trim(),
            handle:   document.getElementById("handle").value.trim().toLowerCase(),
            email:    document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.mensaje);

        localStorage.setItem("fu_token",  data.token);
        localStorage.setItem("fu_usuario", JSON.stringify(data.usuario));
        window.location.href = "index.html";

      } catch (error) {
        err.textContent = error.message;
        err.classList.remove("hidden");
        btn.textContent = "Crear cuenta";
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
