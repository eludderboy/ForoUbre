<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/index.css"/>
</head>
<body>

  <!-- ══ LAYOUT ══ -->
  <div class="layout" id="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
      <nav>
        <a href="/"                  class="nav-item active"><span class="nav-icon"><i class="ri-home-5-fill"></i></span><span>Inicio</span></a>
        <a href="explore.html"       class="nav-item"><span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span></a>
        <a href="videos.html"        class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
        <a href="messages.html"      class="nav-item"><span class="nav-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
        <a href="notifications.html" class="nav-item" id="navNotifs">
          <span class="nav-icon"><i class="ri-notification-4-line"></i></span>
          <span>Notificaciones</span>
          <span class="nav-badge" id="notifBadge" style="display:none">0</span>
        </a>
        <a href="#" class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
      </nav>
      <button class="btn-post-sidebar" id="btnAbrirModal">
        <i class="ri-quill-pen-line"></i><span>Publicar</span>
      </button>
      <div class="sidebar-user" id="sidebarUser"></div>
    </aside>

    <!-- FEED -->
    <main class="feed-col" id="feedCol">
      <div class="feed-hdr">
        <h1>Inicio</h1>
      </div>
      <!-- Composer -->
      <div class="composer" id="composer"></div>
      <!-- Posts -->
      <div class="post-list" id="postList">
        <div class="feed-loading">
          <i class="ri-loader-4-line spin" style="color:var(--green);font-size:1.5rem"></i>
        </div>
      </div>
    </main>

    <!-- PANEL DERECHO -->
    <aside class="right-col" id="rightCol">
      <div class="trends-box" id="trendsBox"></div>
      <div class="who-follow-box" id="whoFollowBox"></div>
    </aside>

  </div>

  <!-- ══ BOTTOM NAV ══ -->
  <nav class="bnav">
    <div class="bnav-inner">
      <a href="/"                  class="nbtn active"><i class="ri-home-5-fill"></i><span>Inicio</span></a>
      <a href="explore.html"       class="nbtn"><i class="ri-search-line"></i><span>Buscar</span></a>
      <a href="videos.html"        class="nbtn"><i class="ri-video-line"></i><span>Videos</span></a>
      <a href="messages.html"      class="nbtn"><i class="ri-message-3-line"></i><span>Mensajes</span></a>
      <a href="notifications.html" class="nbtn" id="bnNotifs"><i class="ri-notification-4-line"></i><span>Notifs</span></a>
      <a href="#" class="nbtn" id="bnPerfil"><i class="ri-user-3-line"></i><span>Perfil</span></a>
    </div>
  </nav>

  <!-- ══ MODALES ══ -->
  <!-- Modal crear post -->
  <div class="modal-overlay hidden" id="modalPost">
    <div class="modal-box" id="modalPostBox"></div>
  </div>

  <!-- Modal imagen full -->
  <div class="modal-overlay hidden" id="modalImg">
    <button class="modal-close" onclick="cerrarModalImg()"><i class="ri-close-line"></i></button>
    <div id="modalImgInner"></div>
  </div>

  <!-- Modal comentarios -->
  <div class="modal-overlay hidden" id="modalComents">
    <div class="modal-box" id="modalCommentsBox"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
