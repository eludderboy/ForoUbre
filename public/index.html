<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/index.css"/>
</head>
<body>

<div class="app-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
    <nav>
      <a href="/" class="nav-item active">
        <span class="nav-icon"><i class="ri-home-5-fill"></i></span><span>Inicio</span>
      </a>
      <a href="explore.html" class="nav-item">
        <span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span>
      </a>
      <a href="videos.html" class="nav-item">
        <span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span>
      </a>
      <a href="messages.html" class="nav-item">
        <span class="nav-icon"><i class="ri-message-3-line"></i></span>
        <span>Mensajes</span>
        <span class="nav-badge hidden" id="msgBadge"></span>
      </a>
      <a href="notifications.html" class="nav-item" id="navNotifs">
        <span class="nav-icon"><i class="ri-notification-4-line"></i></span>
        <span>Notificaciones</span>
        <span class="nav-badge" id="notifBadge" style="display:none">0</span>
      </a>
      <a href="#" class="nav-item" id="navPerfil">
        <span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span>
      </a>
    </nav>
    <button class="btn-post-sidebar" id="btnAbrirModal">
      <i class="ri-quill-pen-line"></i><span>Publicar</span>
    </button>
    <!-- sidebarUser lo llena el JS — btnLogout va en feed-header -->
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- ══ FEED ══ -->
  <main class="feed">

    <div class="feed-header">
      <h2>Inicio</h2>
      <button id="btnLogout" class="btn-logout">
        <i class="ri-logout-box-r-line"></i> Salir
      </button>
    </div>

    <!-- Composer -->
    <div class="new-post">
      <div id="composerAvWrap" style="flex-shrink:0"></div>
      <div class="post-input-area">
        <textarea id="postInput" placeholder="¿Qué está pasando?" rows="2"
          oninput="onComposerInput(this)"
          onkeydown="if(event.key==='Enter'&&event.ctrlKey) publicarNormal()"></textarea>

        <div id="imagePreviewBox" class="image-preview-box hidden">
          <button class="remove-image" onclick="quitarMediaComposer()"><i class="ri-close-line"></i></button>
          <img id="imagePreview" src="" alt=""/>
        </div>

        <div class="post-actions">
          <div class="post-actions-left">
            <label for="imageInput" class="btn-icon" title="Foto/Video">
              <i class="ri-image-add-line"></i>
            </label>
            <input type="file" id="imageInput" accept="image/*,video/mp4,video/webm" hidden onchange="onComposerMedia(this)"/>
            <button class="btn-icon" onclick="abrirModalSticker()" title="Sticker IA">
              <i class="ri-sparkling-2-line"></i>
            </button>
            <button class="btn-icon" onclick="abrirPostModal()" title="Post avanzado">
              <i class="ri-layout-grid-line"></i>
            </button>
            <span id="charCount">280</span>
          </div>
          <button id="btnPost" onclick="publicarNormal()">
            <i class="ri-send-plane-fill"></i> Publicar
          </button>
        </div>
      </div>
    </div>

    <!-- Posts -->
    <div id="feed">
      <div class="loading"><i class="ri-loader-4-line spin"></i> Cargando posts...</div>
    </div>

    <!-- Load more -->
    <div class="load-more-box hidden" id="loadMoreBox">
      <button id="btnLoadMore" onclick="cargarMas()">Cargar más</button>
    </div>

  </main>

  <!-- ══ TRENDS / PANEL DERECHO ══ -->
  <aside class="trends">

    <div class="trends-box">
      <h3>A quién seguir</h3>
      <div id="sugerenciasList">
        <p style="color:var(--text-3);font-size:.82rem">Cargando...</p>
      </div>
    </div>

    <div class="trends-box">
      <h3>Videos recientes</h3>
      <div id="videosRecientesList">
        <p style="color:var(--text-3);font-size:.82rem">Cargando...</p>
      </div>
    </div>

  </aside>

</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"                  class="bottom-nav-btn active"><span class="bn-icon"><i class="ri-home-5-fill"></i></span><span>Inicio</span></a>
    <a href="explore.html"       class="bottom-nav-btn"><span class="bn-icon"><i class="ri-search-line"></i></span><span>Buscar</span></a>
    <a href="videos.html"        class="bottom-nav-btn"><span class="bn-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html"      class="bottom-nav-btn"><span class="bn-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
    <a href="notifications.html" class="bottom-nav-btn" id="bnNotifs"><span class="bn-icon"><i class="ri-notification-4-line"></i></span><span>Notifs</span></a>
    <a href="#"                  class="bottom-nav-btn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<!-- FAB mobile -->
<button class="fab-post" onclick="abrirPostModal()">
  <i class="ri-quill-pen-line"></i>
</button>

<!-- ══ MODAL POST AVANZADO ══ -->
<div class="modal-overlay hidden" id="postModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="ri-quill-pen-line" style="color:var(--green)"></i> Crear post</h3>
      <button class="btn-cerrar-modal" onclick="cerrarPostModal()"><i class="ri-close-line"></i></button>
    </div>

    <div class="post-type-tabs">
      <button class="post-type-tab active" id="tab-normal"    onclick="setTipo('normal',this)"><i class="ri-file-text-line"></i> Normal</button>
      <button class="post-type-tab"        id="tab-slideshow" onclick="setTipo('slideshow',this)"><i class="ri-image-2-line"></i> Slideshow</button>
      <button class="post-type-tab"        id="tab-poll"      onclick="setTipo('poll',this)"><i class="ri-bar-chart-horizontal-line"></i> Encuesta</button>
    </div>

    <textarea id="modalTexto" placeholder="¿Qué quieres compartir?" rows="3"
      style="width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius);color:var(--text);font-size:.93rem;font-family:inherit;padding:12px 14px;resize:none;outline:none;line-height:1.5"
      oninput="autoResizeTA(this)"></textarea>

    <!-- Zona Normal -->
    <div id="zonaNormal">
      <label class="slide-upload-zone" for="normalFile">
        <i class="ri-image-add-line"></i> Añadir foto/video
      </label>
      <input type="file" id="normalFile" accept="image/*,video/mp4,video/webm" hidden onchange="onNormalFile(this)"/>
      <div id="normalPrevBox"></div>
      <div id="normalNSFWRow" class="nsfw-row" style="display:none">
        <span class="nsfw-label"><i class="ri-eye-off-line"></i> NSFW <span class="nsfw-badge">+18</span></span>
        <div class="tswitch" id="nsfwNormal" onclick="this.classList.toggle('on')"></div>
        <span id="nsfwStatus" class="nsfw-detect hidden"></span>
      </div>
    </div>

    <!-- Zona Slideshow -->
    <div id="zonaSlideshow" style="display:none">
      <label class="slide-upload-zone" for="slideFiles">
        <i class="ri-images-line"></i> Añadir imágenes (máx 10)
      </label>
      <input type="file" id="slideFiles" accept="image/*" multiple hidden onchange="onSlideFiles(this)"/>
      <div id="slidePrevGrid" class="slide-prev-grid"></div>
      <div class="audio-row" onclick="document.getElementById('slideAudio').click()">
        <i class="ri-music-line"></i>
        <span id="audioLabel">Añadir música (MP3, OGG...)</span>
      </div>
      <input type="file" id="slideAudio" accept="audio/*" hidden onchange="onSlideAudio(this)"/>
      <div class="nsfw-row">
        <span class="nsfw-label"><i class="ri-eye-off-line"></i> NSFW <span class="nsfw-badge">+18</span></span>
        <div class="tswitch" id="nsfwSlide" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>

    <!-- Zona Poll -->
    <div id="zonaPoll" style="display:none">
      <div id="pollList" class="poll-list">
        <div class="poll-row">
          <input class="poll-inp" placeholder="Opción 1" maxlength="60"/>
          <button class="poll-rm" style="visibility:hidden" onclick="remPollOp(this)"><i class="ri-close-line"></i></button>
        </div>
        <div class="poll-row">
          <input class="poll-inp" placeholder="Opción 2" maxlength="60"/>
          <button class="poll-rm" style="visibility:hidden" onclick="remPollOp(this)"><i class="ri-close-line"></i></button>
        </div>
      </div>
      <button id="btnAddOp" class="btn-add-op" onclick="addPollOp()">
        <i class="ri-add-line"></i> Añadir opción
      </button>
    </div>

    <button id="btnPublicar" class="btn-auth" onclick="publicarPost()">
      <i class="ri-send-plane-fill"></i> Publicar
    </button>
  </div>
</div>

<!-- ══ MODAL IMAGEN FULL ══ -->
<div class="modal-img" id="modalImgFull" onclick="cerrarImgFull()">
  <div id="modalImgInner" onclick="event.stopPropagation()"></div>
</div>

<!-- ══ MODAL STICKER IA ══ -->
<div class="modal-overlay hidden" id="modalSticker">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="ri-sparkling-2-line" style="color:var(--green)"></i> Sticker IA</h3>
      <button class="btn-cerrar-modal" onclick="cerrarModalSticker()"><i class="ri-close-line"></i></button>
    </div>
    <div style="display:flex;gap:8px">
      <input id="stickerPromptInput" placeholder="Describe tu sticker..."
        style="flex:1;background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius-full);color:var(--text);padding:10px 14px;font-size:.88rem;outline:none;font-family:inherit"/>
      <button id="btnGenerarSticker" class="btn-auth" style="width:auto;white-space:nowrap;padding:10px 18px" onclick="generarStickers()">
        <i class="ri-sparkling-2-line"></i> Generar
      </button>
    </div>
    <div id="stickerResults"></div>
    <div id="stickerSeleccionado" class="hidden sticker-selected-bar">
      <span style="font-size:.85rem;font-weight:600;flex:1">✓ Sticker seleccionado</span>
      <button class="btn-auth" style="width:auto;padding:8px 18px" onclick="adjuntarStickerAPost()">Usar este</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
