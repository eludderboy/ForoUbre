<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Mensajes</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #050505;
      --surface:    #0d0d0d;
      --surface2:   #161616;
      --surface3:   #1e1e1e;
      --border:     rgba(255,255,255,.07);
      --text:       #f0f0f0;
      --text-2:     rgba(255,255,255,.6);
      --text-3:     rgba(255,255,255,.35);
      --green:      #5cdb6f;
      --green-dim:  rgba(92,219,111,.12);
      --red:        #ff4466;
      --radius:     14px;
      --radius-sm:  8px;
      --radius-full:9999px;
    }

    html, body { height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ══════════════════════════════
       LAYOUT
    ══════════════════════════════ */
    .msg-layout {
      display:               grid;
      grid-template-columns: 240px 300px 1fr;
      height:                100dvh;
      overflow:              hidden;
    }

    /* ══════════════════════════════
       SIDEBAR NAV
    ══════════════════════════════ */
    .sidebar {
      background:    var(--surface);
      border-right:  1px solid var(--border);
      display:       flex;
      flex-direction:column;
      padding:       20px 14px;
      gap:           6px;
      overflow-y:    auto;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .logo {
      display:     flex;
      align-items: center;
      gap:         10px;
      font-weight: 900;
      font-size:   1.15rem;
      color:       var(--green);
      padding:     6px 10px 18px;
    }
    .logo i { font-size: 1.4rem; }
    .nav-item {
      display:       flex;
      align-items:   center;
      gap:           12px;
      padding:       10px 12px;
      border-radius: var(--radius);
      color:         var(--text-2);
      text-decoration: none;
      font-size:     .92rem;
      font-weight:   500;
      transition:    all .15s;
      position:      relative;
    }
    .nav-item:hover        { background: var(--surface2); color: var(--text); }
    .nav-item.active       { background: var(--green-dim); color: var(--green); font-weight: 700; }
    .nav-item .nav-icon    { font-size: 1.25rem; width: 26px; text-align: center; }
    .nav-badge {
      background:  var(--green); color: #050505;
      border-radius: var(--radius-full); min-width: 18px; height: 18px;
      padding: 0 5px; display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 900; margin-left: auto;
    }
    .sidebar-user {
      margin-top:   auto;
      padding-top:  16px;
      border-top:   1px solid var(--border);
      display:      flex;
      align-items:  center;
      gap:          10px;
      padding:      16px 8px 4px;
    }
    .sidebar-user strong { font-size: .85rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user small  { color: var(--text-3); font-size: .72rem; }

    /* ══════════════════════════════
       PANEL CONVERSACIONES
    ══════════════════════════════ */
    .conv-panel {
      background:    var(--surface);
      border-right:  1px solid var(--border);
      display:       flex;
      flex-direction:column;
      overflow:      hidden;
    }
    .conv-header {
      padding:      16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink:  0;
    }
    .conv-header h2 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
    .conv-search {
      position:  relative;
      display:   flex;
      align-items: center;
    }
    .conv-search i {
      position:  absolute;
      left:      11px;
      color:     var(--text-3);
      font-size: 1rem;
    }
    .conv-search input {
      width:         100%;
      background:    var(--surface2);
      border:        1px solid var(--border);
      border-radius: var(--radius-full);
      color:         var(--text);
      padding:       7px 12px 7px 34px;
      font-size:     .83rem;
      outline:       none;
    }
    .conv-search input::placeholder { color: var(--text-3); }

    .conv-list {
      flex:       1;
      overflow-y: auto;
      padding:    6px 0;
    }
    .conv-list::-webkit-scrollbar { display: none; }

    .conv-item {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       10px 14px;
      cursor:        pointer;
      transition:    background .12s;
      position:      relative;
    }
    .conv-item:hover  { background: var(--surface2); }
    .conv-item.active { background: rgba(92,219,111,.08); }

    .conv-avatar {
      position:  relative;
      flex-shrink:0;
    }
    .conv-avatar img,
    .conv-avatar video {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }
    .conv-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px;
      background: var(--green);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      margin-bottom:   2px;
    }
    .conv-name   { font-size: .88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .conv-time   { font-size: .68rem; color: var(--text-3); flex-shrink: 0; }
    .conv-preview {
      font-size:  .78rem; color: var(--text-3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display:    flex; align-items: center; gap: 4px;
    }
    .conv-preview.unread { color: var(--text); font-weight: 600; }
    .conv-badge {
      background:  var(--green); color: #050505;
      border-radius: var(--radius-full); min-width: 18px; height: 18px;
      padding: 0 5px; font-size: .65rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .conv-empty {
      display:        flex;
      flex-direction: column;
      align-items:    center;
      justify-content:center;
      gap:            12px;
      height:         100%;
      color:          var(--text-3);
      font-size:      .85rem;
      text-align:     center;
      padding:        24px;
    }
    .conv-empty i { font-size: 2.5rem; }

    /* ══════════════════════════════
       PANEL CHAT
    ══════════════════════════════ */
    .chat-panel {
      display:        flex;
      flex-direction: column;
      background:     var(--bg);
      overflow:       hidden;
    }

    /* Vacío */
    .chat-empty {
      flex: 1;
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      gap:             16px;
      color:           var(--text-3);
      text-align:      center;
      padding:         24px;
    }
    .chat-empty i    { font-size: 4rem; }
    .chat-empty h3   { font-size: 1rem; font-weight: 700; color: var(--text-2); }
    .chat-empty p    { font-size: .85rem; line-height: 1.6; }

    /* Header del chat */
    .chat-header {
      display:       flex;
      align-items:   center;
      gap:           12px;
      padding:       12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink:   0;
      background:    var(--surface);
    }
    .chat-header .btn-back {
      display:       none;
      background:    none;
      border:        none;
      color:         var(--text-2);
      font-size:     1.3rem;
      cursor:        pointer;
      padding:       4px;
    }
    .chat-header .ch-avatar {
      width: 38px; height: 38px;
      border-radius: 50%; object-fit: cover; flex-shrink: 0;
      cursor: pointer;
    }
    .chat-header .ch-info { flex: 1; min-width: 0; cursor: pointer; }
    .chat-header .ch-name  { font-weight: 800; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header .ch-sub   { font-size: .73rem; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
    .ch-online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }

    /* Mensajes */
    .chat-messages {
      flex:       1;
      overflow-y: auto;
      padding:    16px 16px 8px;
      display:    flex;
      flex-direction: column;
      gap:        3px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track  { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb  { background: rgba(255,255,255,.1); border-radius: 4px; }

    /* Grupos de mensajes */
    .msg-group {
      display:        flex;
      flex-direction: column;
      gap:            2px;
      margin-bottom:  6px;
    }
    .msg-group.mine   { align-items: flex-end; }
    .msg-group.theirs { align-items: flex-start; }

    /* Fila individual */
    .msg-row {
      display:     flex;
      align-items: flex-end;
      gap:         6px;
      max-width:   75%;
    }
    .msg-group.mine   .msg-row { flex-direction: row-reverse; }
    .msg-group.theirs .msg-row { flex-direction: row; }

    .msg-avatar-sm {
      width: 26px; height: 26px;
      border-radius: 50%; object-fit: cover;
      flex-shrink: 0; opacity: 0; /* only shown on first of group */
    }
    .msg-group.theirs .msg-row:last-child .msg-avatar-sm { opacity: 1; }
    .msg-group.mine   .msg-row .msg-avatar-sm { display: none; }

    /* Burbuja */
    .msg-bubble {
      padding:       7px 11px;
      border-radius: 16px;
      font-size:     .875rem;
      line-height:   1.45;
      word-break:    break-word;
      max-width:     100%;
    }
    .msg-group.mine   .msg-bubble {
      background:            var(--green);
      color:                 #050505;
      border-bottom-right-radius: 4px;
    }
    .msg-group.theirs .msg-bubble {
      background:           var(--surface3);
      color:                var(--text);
      border-bottom-left-radius: 4px;
    }
    /* Burbuja primera del grupo: esquina superior redondeada */
    .msg-group.mine   .msg-row:first-child .msg-bubble { border-top-right-radius: 16px; }
    .msg-group.theirs .msg-row:first-child .msg-bubble { border-top-left-radius:  16px; }

    /* Media en burbujas */
    .msg-media-img {
      max-width:     220px;
      max-height:    280px;
      border-radius: 10px;
      display:       block;
      cursor:        pointer;
      object-fit:    cover;
    }
    .msg-media-video {
      max-width:     220px;
      border-radius: 10px;
      display:       block;
    }
    .msg-media-only { padding: 3px; background: transparent !important; }

    /* Meta (hora + visto) */
    .msg-meta-wrap {
      display:     flex;
      align-items: center;
      gap:         4px;
      margin-top:  1px;
    }
    .msg-group.mine   .msg-meta-wrap { justify-content: flex-end; }
    .msg-group.theirs .msg-meta-wrap { justify-content: flex-start; }

    .msg-time {
      font-size: .65rem;
      color:     var(--text-3);
    }
    .msg-group.mine .msg-time { color: rgba(0,0,0,.35); }

    .msg-status {
      font-size: .65rem;
      color:     rgba(0,0,0,.35);
      display:   flex;
      align-items: center;
      gap:       2px;
    }
    .msg-status.leido { color: #1a6b2a; font-weight: 700; }

    /* Typing */
    .typing-indicator {
      display:     flex;
      align-items: center;
      gap:         8px;
      padding:     6px 16px;
      font-size:   .78rem;
      color:       var(--text-3);
      min-height:  28px;
      flex-shrink: 0;
    }
    .typing-dots { display: flex; gap: 3px; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--text-3);
      border-radius: 50%;
      animation: bounce .8s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%         { transform: translateY(-5px); }
    }

    /* Separador de fecha */
    .msg-date-sep {
      text-align:   center;
      font-size:    .7rem;
      color:        var(--text-3);
      padding:      8px 0 4px;
      font-weight:  600;
      letter-spacing: .3px;
    }

    /* Media preview sobre el input */
    .media-preview-bar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       8px 14px 0;
      flex-shrink:   0;
    }
    .media-preview-bar .preview-thumb {
      position:     relative;
      width:        60px; height: 60px;
      border-radius:var(--radius-sm);
      overflow:     hidden;
      background:   var(--surface2);
      flex-shrink:  0;
    }
    .media-preview-bar .preview-thumb img,
    .media-preview-bar .preview-thumb video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .media-preview-bar .preview-thumb .remove-thumb {
      position:    absolute;
      top:         2px; right: 2px;
      background:  rgba(0,0,0,.7);
      border:      none;
      color:       #fff;
      width:       18px; height: 18px;
      border-radius: 50%;
      font-size:   .7rem;
      cursor:      pointer;
      display:     flex;
      align-items: center;
      justify-content: center;
    }
    .media-preview-bar small {
      font-size: .75rem; color: var(--text-3);
    }

    /* Input bar */
    .chat-input-bar {
      padding:       10px 14px 12px;
      border-top:    1px solid var(--border);
      flex-shrink:   0;
      background:    var(--surface);
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }
    .chat-input-row {
      display:     flex;
      align-items: flex-end;
      gap:         8px;
    }
    .btn-attach {
      background:    none;
      border:        none;
      color:         var(--text-3);
      font-size:     1.35rem;
      cursor:        pointer;
      padding:       6px;
      border-radius: 50%;
      transition:    all .15s;
      flex-shrink:   0;
    }
    .btn-attach:hover { color: var(--green); background: var(--green-dim); }

    .chat-input {
      flex:          1;
      background:    var(--surface2);
      border:        1px solid var(--border);
      border-radius: var(--radius-full);
      color:         var(--text);
      padding:       9px 16px;
      font-size:     .9rem;
      outline:       none;
      resize:        none;
      max-height:    120px;
      overflow-y:    auto;
      line-height:   1.4;
      transition:    border-color .15s;
    }
    .chat-input:focus       { border-color: rgba(92,219,111,.4); }
    .chat-input::placeholder{ color: var(--text-3); }
    .chat-input::-webkit-scrollbar { display: none; }

    .btn-send {
      background:    var(--green);
      border:        none;
      color:         #050505;
      width:         38px; height: 38px;
      border-radius: 50%;
      font-size:     1.05rem;
      cursor:        pointer;
      display:       flex;
      align-items:   center;
      justify-content:center;
      flex-shrink:   0;
      transition:    background .15s, transform .1s;
    }
    .btn-send:hover  { background: #4ec261; }
    .btn-send:active { transform: scale(.9); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }

    /* ══════════════════════════════
       MODAL MEDIA FULL
    ══════════════════════════════ */
    .media-modal {
      position:    fixed;
      inset:       0;
      background:  rgba(0,0,0,.95);
      z-index:     500;
      display:     flex;
      align-items: center;
      justify-content: center;
      cursor:      pointer;
    }
    .media-modal.hidden { display: none; }
    .media-modal img    { max-width: 95vw; max-height: 95dvh; border-radius: var(--radius); object-fit: contain; }
    .media-modal video  { max-width: 95vw; max-height: 95dvh; border-radius: var(--radius); }
    .media-modal .close-modal {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.1); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 50%; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ══════════════════════════════
       LOADING / EMPTY
    ══════════════════════════════ */
    .loading-msgs {
      display:        flex;
      flex-direction: column;
      align-items:    center;
      justify-content:center;
      gap:            10px;
      flex:           1;
      color:          var(--text-3);
      font-size:      .85rem;
    }
    .spin { display: inline-block; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════
       BOTTOM NAV MOBILE
    ══════════════════════════════ */
    .bottom-nav { display: none; }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 900px) {
      .msg-layout { grid-template-columns: 72px 260px 1fr; }
      .sidebar .nav-item span:last-child { display: none; }
      .sidebar .logo span { display: none; }
      .sidebar .btn-post-sidebar span { display: none; }
      .sidebar-user strong, .sidebar-user small { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .nav-item .nav-icon { width: auto; font-size: 1.4rem; }
    }

    @media (max-width: 640px) {
      .msg-layout {
        grid-template-columns: 1fr;
        grid-template-rows:    1fr auto;
      }
      .sidebar { display: none; }
      .conv-panel {
        display:  block;
        position: fixed;
        inset:    0;
        z-index:  10;
        transition: transform .3s ease;
      }
      .conv-panel.hidden-mobile {
        transform: translateX(-100%);
        pointer-events: none;
      }
      .chat-panel {
        position: fixed;
        inset:    0;
        z-index:  10;
        transition: transform .3s ease;
      }
      .chat-panel.hidden-mobile {
        transform: translateX(100%);
        pointer-events: none;
      }
      .chat-header .btn-back { display: flex; }
      .bottom-nav {
        display:  block;
        position: fixed;
        bottom:   0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index:  20;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .bottom-nav-inner {
        display:         flex;
        align-items:     center;
        justify-content: space-around;
        padding:         6px 0 2px;
      }
      .bottom-nav-btn {
        display:        flex;
        flex-direction: column;
        align-items:    center;
        gap:            2px;
        color:          var(--text-3);
        text-decoration:none;
        font-size:      .62rem;
        font-weight:    600;
        padding:        4px 14px;
        border-radius:  var(--radius);
        transition:     color .15s;
      }
      .bottom-nav-btn.active { color: var(--green); }
      .bottom-nav-btn .bn-icon { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<div class="msg-layout">

  <!-- ══════════ SIDEBAR NAV ══════════ -->
  <aside class="sidebar">
    <div class="logo">
      <i class="ri-leaf-fill"></i>
      <span>Foro Ubre</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:4px">
      <a href="/"             class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
      <a href="explore.html"  class="nav-item"><span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span></a>
      <a href="videos.html"   class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
      <a href="messages.html" class="nav-item active"><span class="nav-icon"><i class="ri-message-3-fill"></i></span><span>Mensajes</span></a>
      <a href="#" class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- ══════════ PANEL CONVERSACIONES ══════════ -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-header">
      <h2><i class="ri-message-3-fill" style="color:var(--green);margin-right:6px"></i>Mensajes</h2>
      <div class="conv-search">
        <i class="ri-search-line"></i>
        <input type="text" id="searchConvs" placeholder="Buscar conversación..."
               oninput="filtrarConvs(this.value)"/>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">
        <i class="ri-loader-4-line spin" style="color:var(--green)"></i>
        Cargando...
      </div>
    </div>
  </div>

  <!-- ══════════ PANEL CHAT ══════════ -->
  <div class="chat-panel hidden-mobile" id="chatPanel">
    <div class="chat-empty" id="chatEmpty">
      <i class="ri-message-3-line"></i>
      <h3>Tus mensajes</h3>
      <p>Selecciona una conversación<br/>o inicia una nueva desde un perfil.</p>
    </div>
    <!-- Se oculta y aparece el chat activo -->
  </div>

</div>

<!-- ══════════ BOTTOM NAV ══════════ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"             class="bottom-nav-btn"><span class="bn-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html"  class="bottom-nav-btn"><span class="bn-icon"><i class="ri-search-line"></i></span><span>Buscar</span></a>
    <a href="videos.html"   class="bottom-nav-btn"><span class="bn-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html" class="bottom-nav-btn active"><span class="bn-icon"><i class="ri-message-3-fill"></i></span><span>Mensajes</span></a>
    <a href="#" class="bottom-nav-btn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<!-- ══════════ MODAL MEDIA ══════════ -->
<div class="media-modal hidden" id="mediaModal" onclick="cerrarMediaModal()">
  <button class="close-modal" onclick="cerrarMediaModal()"><i class="ri-close-line"></i></button>
  <div id="mediaModalContent"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const API   = "/api";
const token = localStorage.getItem("fu_token");
const yo    = JSON.parse(localStorage.getItem("fu_usuario") || "null");
if (!token || !yo) window.location.href = "/login.html";

// Nav links
document.getElementById("navPerfil").href = `profile.html?handle=${yo.handle}`;
document.getElementById("bnPerfil").href  = `profile.html?handle=${yo.handle}`;

// Sidebar user
const _sbAv = yo.avatarTipo === "video"
  ? `<video src="${yo.avatar}" autoplay loop muted playsinline style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0"></video>`
  : `<img src="${yo.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`;
document.getElementById("sidebarUser").innerHTML = `
  ${_sbAv}
  <div style="min-width:0">
    <strong>${escHtml(yo.nombre)}</strong>
    <small>@${escHtml(yo.handle)}</small>
  </div>
`;

// ══ ESTADO ══
let convs          = [];
let convActiva     = null;
let mediaFile      = null;
let typingTimer    = null;
let otroEstaTyping = false;
let socket         = null;

// ══ SOCKET ══
try {
  socket = io({ auth: { token } });
  socket.emit("registrar", yo._id);

  socket.on("nuevoMensaje", ({ convId, mensaje }) => {
    // Actualizar lista
    actualizarConvEnLista(convId, mensaje);
    // Si es la conv activa, agregar mensaje
    if (convActiva === convId) {
      agregarMensajeAlChat(mensaje);
      marcarLeido(convId, true);
    } else {
      incrementarBadge(convId);
    }
  });

  socket.on("usuarioEscribiendo", ({ convId }) => {
    if (convActiva === convId) mostrarTyping(true);
  });
  socket.on("usuarioDejoEscribir", ({ convId }) => {
    if (convActiva === convId) mostrarTyping(false);
  });
  socket.on("mensajesLeidos", ({ convId }) => {
    if (convActiva === convId) marcarMensajesComoLeidos();
  });
} catch(e) {}

// ══════════════════════════
// CONVERSACIONES
// ══════════════════════════
async function cargarConversaciones() {
  try {
    const res  = await fetch(`${API}/messages`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    convs = await res.json();
    renderConvList(convs);

    // Abrir conv desde URL param
    const paramConv = new URLSearchParams(location.search).get("conv");
    if (paramConv) abrirConv(paramConv);
  } catch(e) {
    document.getElementById("convList").innerHTML = `
      <div class="conv-empty">
        <i class="ri-error-warning-line" style="color:var(--red)"></i>
        Error al cargar
      </div>
    `;
  }
}

function renderConvList(lista) {
  const el = document.getElementById("convList");
  if (!lista.length) {
    el.innerHTML = `
      <div class="conv-empty">
        <i class="ri-message-3-line"></i>
        <p>Sin conversaciones aún.<br/>Visita un perfil y toca "Mensaje".</p>
      </div>
    `;
    return;
  }
  el.innerHTML = lista.map(c => renderConvItem(c)).join("");
}

function renderConvItem(c) {
  const otro = c.otro || {};
  const avEl = otro.avatarTipo === "video"
    ? `<video src="${otro.avatar||''}" autoplay loop muted playsinline></video>`
    : `<img src="${otro.avatar||''}" alt=""/>`;

  let preview = "Toca para chatear";
  if (c.ultimoMensaje) {
    const esM = c.ultimoMensaje.autor?.toString() === yo._id || c.ultimoMensaje.autor === yo._id;
    const txt = c.ultimoMensaje.texto || "";
    const med = c.ultimoMensaje.mediaTipo;
    if (med === "imagen")      preview = `${esM?"Tú":""}📷 Foto`;
    else if (med === "video")  preview = `${esM?"Tú":""}🎥 Video`;
    else if (txt)              preview = `${esM ? "Tú: " : ""}${txt}`;
  }

  const hora = c.ultimoMensaje?.createdAt ? tiempoCorto(c.ultimoMensaje.createdAt) : "";

  return `
    <div class="conv-item ${convActiva === c._id ? 'active' : ''}"
         id="conv-item-${c._id}"
         onclick="abrirConv('${c._id}')">
      <div class="conv-avatar">
        ${avEl}
      </div>
      <div class="conv-info">
        <div class="conv-name-row">
          <span class="conv-name">${escHtml(otro.nombre || "?")}</span>
          <span class="conv-time">${hora}</span>
        </div>
        <div class="conv-preview ${c.noLeidos > 0 ? 'unread' : ''}">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(preview)}</span>
          ${c.noLeidos > 0
            ? `<span class="conv-badge" id="badge-${c._id}">${c.noLeidos}</span>`
            : `<span id="badge-${c._id}"></span>`}
        </div>
      </div>
    </div>
  `;
}

function filtrarConvs(q) {
  if (!q.trim()) { renderConvList(convs); return; }
  const f = convs.filter(c =>
    (c.otro?.nombre?.toLowerCase().includes(q.toLowerCase()) ||
     c.otro?.handle?.toLowerCase().includes(q.toLowerCase()))
  );
  renderConvList(f);
}

// ══════════════════════════
// ABRIR CONVERSACIÓN
// ══════════════════════════
async function abrirConv(convId) {
  convActiva = convId;

  // Marcar activa en lista
  document.querySelectorAll(".conv-item").forEach(el =>
    el.classList.toggle("active", el.id === `conv-item-${convId}`)
  );

  // Mobile: mostrar chat
  document.getElementById("convPanel").classList.add("hidden-mobile");
  document.getElementById("chatPanel").classList.remove("hidden-mobile");

  // Render estructura del chat
  const conv = convs.find(c => c._id === convId);
  const otro = conv?.otro || {};

  document.getElementById("chatPanel").innerHTML = `
    <div class="chat-header" id="chatHeader">
      <button class="btn-back" onclick="volverALista()">
        <i class="ri-arrow-left-line"></i>
      </button>
      ${otro.avatarTipo === "video"
        ? `<video src="${otro.avatar||''}" class="ch-avatar" autoplay loop muted playsinline
                  onclick="window.location.href='profile.html?handle=${escHtml(otro.handle)}'"></video>`
        : `<img src="${otro.avatar||''}" class="ch-avatar" alt=""
                onclick="window.location.href='profile.html?handle=${escHtml(otro.handle)}'"/>`}
      <div class="ch-info"
           onclick="window.location.href='profile.html?handle=${escHtml(otro.handle)}'">
        <div class="ch-name">${escHtml(otro.nombre || "?")}</div>
        <div class="ch-sub">
          <span>@${escHtml(otro.handle || "")}</span>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="loading-msgs">
        <i class="ri-loader-4-line spin" style="font-size:1.5rem;color:var(--green)"></i>
        Cargando mensajes...
      </div>
    </div>

    <div class="typing-indicator hidden" id="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span style="font-size:.75rem">escribiendo...</span>
    </div>

    <div class="media-preview-bar hidden" id="mediaPreviewBar"></div>

    <div class="chat-input-bar">
      <div class="chat-input-row">
        <label for="mediaInput" class="btn-attach" title="Enviar foto o video">
          <i class="ri-image-add-line"></i>
        </label>
        <input type="file" id="mediaInput"
               accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm" hidden
               onchange="seleccionarMedia(this)"/>
        <textarea class="chat-input" id="chatInput"
                  placeholder="Escribe un mensaje..."
                  rows="1"
                  onkeydown="manejarKeydown(event)"
                  oninput="autoResize(this); onTyping()"></textarea>
        <button class="btn-send" id="btnSend" onclick="enviarMensaje()">
          <i class="ri-send-plane-fill"></i>
        </button>
      </div>
    </div>
  `;

  await cargarMensajes(convId);
  marcarLeido(convId, false);
  document.getElementById("chatInput")?.focus();
}

function volverALista() {
  convActiva = null;
  document.getElementById("convPanel").classList.remove("hidden-mobile");
  document.getElementById("chatPanel").classList.add("hidden-mobile");
}

// ══════════════════════════
// CARGAR MENSAJES
// ══════════════════════════
async function cargarMensajes(convId) {
  try {
    const res      = await fetch(`${API}/messages/${convId}?limite=60`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const mensajes = await res.json();
    const box      = document.getElementById("chatMessages");
    if (!box) return;
    box.innerHTML  = "";

    if (!mensajes.length) {
      box.innerHTML = `
        <div style="text-align:center;color:var(--text-3);font-size:.82rem;padding:24px">
          <i class="ri-chat-smile-3-line" style="font-size:2rem;display:block;margin-bottom:8px"></i>
          Sin mensajes aún. ¡Di hola! 👋
        </div>
      `;
      return;
    }

    renderMensajes(mensajes, box);
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    const box = document.getElementById("chatMessages");
    if (box) box.innerHTML = `<div class="loading-msgs" style="color:var(--red)">Error al cargar</div>`;
  }
}

function renderMensajes(mensajes, container) {
  // Agrupar mensajes por autor y tiempo (~2min)
  let grupos = [];
  let grupoActual = null;

  mensajes.forEach((msg, i) => {
    const esMio = msg.autor._id?.toString() === yo._id || msg.autor === yo._id ||
                  (msg.autor._id || msg.autor) === yo._id;
    const prevMsg = mensajes[i - 1];
    const mismoDia = prevMsg && mismoDiaFn(prevMsg.createdAt, msg.createdAt);

    if (!mismoDia && i > 0) {
      grupos.push({ type: "date", date: msg.createdAt });
      grupoActual = null;
    }
    if (!grupoActual) {
      grupos.push({ type: "date", date: msg.createdAt, hideIfFirst: i === 0 });
    }

    const mismoAutor = grupoActual && grupoActual.esMio === esMio;
    const cercano    = grupoActual && (new Date(msg.createdAt) - new Date(grupoActual.msgs.at(-1).createdAt)) < 120000;

    if (mismoAutor && cercano) {
      grupoActual.msgs.push(msg);
    } else {
      grupoActual = { esMio, msgs: [msg] };
      grupos.push(grupoActual);
    }
  });

  // Renderizar separadores de fecha y grupos
  let lastDate = null;
  grupos.forEach(g => {
    if (g.type === "date") {
      const d = new Date(g.date).toLocaleDateString("es", { weekday:"long", day:"numeric", month:"long" });
      if (d !== lastDate) {
        lastDate = d;
        if (!g.hideIfFirst || g.hideIfFirst === false) {
          const sep = document.createElement("div");
          sep.className   = "msg-date-sep";
          sep.textContent = d;
          container.appendChild(sep);
        }
      }
      return;
    }
    container.appendChild(renderGrupoMensajes(g));
  });
}

function renderGrupoMensajes(grupo) {
  const div = document.createElement("div");
  div.className = `msg-group ${grupo.esMio ? "mine" : "theirs"}`;

  const autor = grupo.msgs[0].autor;

  grupo.msgs.forEach((msg, idx) => {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.id        = `msg-${msg._id}`;

    // Avatar (solo en theirs, último del grupo)
    if (!grupo.esMio) {
      const avEl = (autor.avatarTipo === "video")
        ? `<video src="${autor.avatar||''}" class="msg-avatar-sm" autoplay loop muted playsinline></video>`
        : `<img src="${autor.avatar||''}" class="msg-avatar-sm" alt=""/>`;
      row.innerHTML += avEl;
    }

    // Burbuja
    const bubble = document.createElement("div");
    const soloMedia = msg.media?.url && !msg.texto;
    bubble.className = `msg-bubble${soloMedia ? " msg-media-only" : ""}`;

    if (msg.mediaUrl) {
  if (msg.mediaTipo === "video") {
    bubble.innerHTML += `
      <video src="${msg.mediaUrl}" class="msg-media-video" controls playsinline
             onclick="event.stopPropagation()"></video>
    `;
  } else {
    bubble.innerHTML += `
      <img src="${msg.mediaUrl}" class="msg-media-img" alt="foto"
           onclick="verMedia('${msg.mediaUrl}','imagen')"/>
    `;
  }
                     }
    if (msg.texto) {
      bubble.innerHTML += `<span>${escHtml(msg.texto)}</span>`;
    }
    row.appendChild(bubble);

    // Meta (hora + estado)
    const isLast = idx === grupo.msgs.length - 1;
    if (isLast) {
      const meta = document.createElement("div");
      meta.className = "msg-meta-wrap";
      meta.innerHTML = `
        <span class="msg-time">${horaFmt(msg.createdAt)}</span>
        ${grupo.esMio ? `
          <span class="msg-status ${msg.leido ? 'leido' : ''}" id="status-${msg._id}">
            <i class="${msg.leido ? 'ri-check-double-line' : 'ri-check-line'}"></i>
            ${msg.leido ? "Visto" : ""}
          </span>` : ""}
      `;
      row.appendChild(meta);
    }

    div.appendChild(row);
  });

  return div;
}

// ══════════════════════════
// ENVIAR MENSAJE
// ══════════════════════════
async function enviarMensaje() {
  const inputEl = document.getElementById("chatInput");
  const texto   = inputEl?.value.trim();
  if (!texto && !mediaFile) return;
  if (!convActiva) return;

  const btnSend = document.getElementById("btnSend");
  if (btnSend) { btnSend.disabled = true; }

  // Parar typing
  if (socket) {
    const conv   = convs.find(c => c._id === convActiva);
    const otroId = conv?.otro?._id;
    if (otroId) socket.emit("dejoDeEscribir", { convId: convActiva, destinatarioId: otroId });
  }

  try {
    const fd = new FormData();
    if (texto)     fd.append("texto", texto);
    if (mediaFile) fd.append("media", mediaFile);

    const res  = await fetch(`${API}/messages/${convActiva}`, {
      method:  "POST",
      headers: { Authorization: `Bearer ${token}` },
      body:    fd
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.mensaje);

    // Limpiar input
    if (inputEl)  { inputEl.value = ""; inputEl.style.height = "auto"; }
    limpiarMediaPreview();

    // Agregar al chat
    agregarMensajeAlChat(data);

    // Notificar por socket
    const conv   = convs.find(c => c._id === convActiva);
    const otroId = conv?.otro?._id;
    if (socket && otroId) {
      socket.emit("enviarMensaje", {
        convId:         convActiva,
        mensaje:        data,
        destinatarioId: otroId
      });
    }

    // Actualizar lista de convs
    actualizarConvEnLista(convActiva, data);

  } catch(e) {
    alert("Error: " + e.message);
  } finally {
    if (btnSend) btnSend.disabled = false;
    inputEl?.focus();
  }
}

function agregarMensajeAlChat(msg) {
  const box = document.getElementById("chatMessages");
  if (!box) return;

  // Quitar mensaje de "sin mensajes"
  const empty = box.querySelector(".chat-empty-msg");
  if (empty) empty.remove();

  const esMio  = (msg.autor._id || msg.autor) === yo._id ||
                 msg.autor._id?.toString() === yo._id;
  const grupo  = renderGrupoMensajes({ esMio, msgs: [msg] });
  box.appendChild(grupo);
  box.scrollTop = box.scrollHeight;
}

function marcarMensajesComoLeidos() {
  document.querySelectorAll("[id^='status-']").forEach(el => {
    el.className = "msg-status leido";
    el.innerHTML = `<i class="ri-check-double-line"></i> Visto`;
  });
}

// ══════════════════════════
// MARCAR LEÍDO
// ══════════════════════════
async function marcarLeido(convId, silencioso) {
  try {
    await fetch(`${API}/messages/${convId}/read`, {
      method: "PUT", headers: { Authorization: `Bearer ${token}` }
    });
    // Quitar badge
    const badge = document.getElementById(`badge-${convId}`);
    if (badge)  { badge.textContent = ""; badge.style.display = "none"; }
    const item  = document.getElementById(`conv-item-${convId}`);
    item?.querySelector(".conv-preview")?.classList.remove("unread");
    // Notificar al otro por socket que leyó
    if (!silencioso && socket) {
      const conv   = convs.find(c => c._id === convId);
      const otroId = conv?.otro?._id;
      if (otroId) socket.emit("mensajesLeidos", { convId, destinatarioId: otroId });
    }
  } catch(_) {}
}

// ══════════════════════════
// TYPING
// ══════════════════════════
function onTyping() {
  if (!socket || !convActiva) return;
  const conv   = convs.find(c => c._id === convActiva);
  const otroId = conv?.otro?._id;
  if (!otroId) return;
  socket.emit("escribiendo", { convId: convActiva, nombre: yo.nombre, destinatarioId: otroId });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    socket.emit("dejoDeEscribir", { convId: convActiva, destinatarioId: otroId });
  }, 1800);
}

function mostrarTyping(show) {
  const el = document.getElementById("typingIndicator");
  if (el) el.classList.toggle("hidden", !show);
}

// ══════════════════════════
// MEDIA
// ══════════════════════════
function seleccionarMedia(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 25 * 1024 * 1024) { alert("Máximo 25MB"); input.value = ""; return; }
  mediaFile = file;
  const url  = URL.createObjectURL(file);
  const bar  = document.getElementById("mediaPreviewBar");
  const esVideo = file.type.startsWith("video/");
  bar.classList.remove("hidden");
  bar.innerHTML = `
    <div class="preview-thumb">
      ${esVideo
        ? `<video src="${url}" muted></video>`
        : `<img src="${url}" alt=""/>`}
      <button class="remove-thumb" onclick="limpiarMediaPreview()">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <small>${esVideo ? "🎥 Video" : "📷 Foto"} · ${(file.size/1024/1024).toFixed(1)}MB</small>
  `;
}

function limpiarMediaPreview() {
  mediaFile = null;
  const bar   = document.getElementById("mediaPreviewBar");
  const input = document.getElementById("mediaInput");
  if (bar)   { bar.classList.add("hidden"); bar.innerHTML = ""; }
  if (input) input.value = "";
}

function verMedia(url, tipo) {
  const modal = document.getElementById("mediaModal");
  const cont  = document.getElementById("mediaModalContent");
  modal.classList.remove("hidden");
  if (tipo === "video" || url.includes(".mp4") || url.includes(".webm")) {
    cont.innerHTML = `<video src="${url}" controls autoplay playsinline
                             onclick="event.stopPropagation()" style="max-width:95vw;max-height:95dvh;border-radius:14px"></video>`;
  } else {
    cont.innerHTML = `<img src="${url}" onclick="event.stopPropagation()" alt=""/>`;
  }
}
function cerrarMediaModal() {
  document.getElementById("mediaModal").classList.add("hidden");
  document.getElementById("mediaModalContent").innerHTML = "";
}

// ══════════════════════════
// ACTUALIZAR LISTA DE CONVS
// ══════════════════════════
function actualizarConvEnLista(convId, msg) {
  const idx = convs.findIndex(c => c._id === convId);
  if (idx !== -1) {
    convs[idx].ultimoMensaje = msg;
    convs[idx].updatedAt     = msg.createdAt;
    if ((msg.autor._id || msg.autor) !== yo._id) {
      convs[idx].noLeidos = (convs[idx].noLeidos || 0) + 1;
    }
    // Mover al inicio
    convs.unshift(convs.splice(idx, 1)[0]);
    renderConvList(convs);
  }
}

function incrementarBadge(convId) {
  const badge = document.getElementById(`badge-${convId}`);
  if (badge) {
    const n = parseInt(badge.textContent || "0") + 1;
    badge.textContent  = n;
    badge.style.display = "flex";
  }
}

// ══════════════════════════
// INPUT AUTOSIZE
// ══════════════════════════
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function manejarKeydown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    enviarMensaje();
  }
}

// ══════════════════════════
// UTILS
// ══════════════════════════
function escHtml(s = "") {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function horaFmt(f) {
  return new Date(f).toLocaleTimeString("es", { hour:"2-digit", minute:"2-digit" });
}
function tiempoCorto(f) {
  const d = (Date.now() - new Date(f)) / 1000;
  if (d < 60)    return "ahora";
  if (d < 3600)  return `${Math.floor(d/60)}m`;
  if (d < 86400) return `${Math.floor(d/3600)}h`;
  return new Date(f).toLocaleDateString("es", { day:"numeric", month:"short" });
}
function mismoDiaFn(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") cerrarMediaModal();
});

// ══ INIT ══
cargarConversaciones();
</script>
</body>
