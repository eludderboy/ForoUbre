<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Mensajes</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #050505;
      --surface:     #0d0d0d;
      --surface2:    #161616;
      --surface3:    #1e1e1e;
      --border:      rgba(255,255,255,.07);
      --text:        #f0f0f0;
      --text-2:      rgba(255,255,255,.6);
      --text-3:      rgba(255,255,255,.35);
      --green:       #5cdb6f;
      --green-dim:   rgba(92,219,111,.12);
      --red:         #ff4466;
      --radius:      14px;
      --radius-full: 9999px;
    }
    html, body {
      height: 100dvh; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ══ LAYOUT ══ */
    .msg-layout {
      display: grid;
      grid-template-columns: 220px 290px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 18px 12px; gap: 4px; overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 900; font-size: 1.1rem; color: var(--green);
      padding: 4px 8px 16px;
    }
    .logo i { font-size: 1.3rem; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 10px; border-radius: var(--radius);
      color: var(--text-2); text-decoration: none;
      font-size: .9rem; font-weight: 500;
      transition: all .15s; position: relative;
    }
    .nav-item:hover  { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--green-dim); color: var(--green); font-weight: 700; }
    .nav-icon        { font-size: 1.2rem; width: 24px; text-align: center; }
    .nav-badge {
      background: var(--green); color: #050505;
      border-radius: var(--radius-full); min-width: 17px; height: 17px;
      padding: 0 4px; font-size: .62rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      margin-left: auto;
    }
    .sidebar-user {
      margin-top: auto; padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 9px;
      padding: 14px 6px 2px;
    }
    .sidebar-user strong { font-size: .83rem; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sidebar-user small  { color: var(--text-3); font-size: .7rem; }

    /* ══ PANEL CONVS ══ */
    .conv-panel {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .conv-header {
      padding: 14px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .conv-header h2 { font-size: .97rem; font-weight: 800; margin-bottom: 9px; }
    .conv-search    { position: relative; }
    .conv-search i  { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: .95rem; }
    .conv-search input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius-full);
      color: var(--text); padding: 7px 12px 7px 32px;
      font-size: .82rem; outline: none;
    }
    .conv-search input::placeholder { color: var(--text-3); }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { display: none; }
    .conv-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; cursor: pointer; transition: background .12s;
    }
    .conv-item:hover  { background: var(--surface2); }
    .conv-item.active { background: rgba(92,219,111,.08); }
    .conv-av { position: relative; flex-shrink: 0; }
    .conv-av img, .conv-av video {
      width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
    }
    .conv-info   { flex: 1; min-width: 0; }
    .conv-name-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;
    }
    .conv-name  { font-size: .86rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .conv-time  { font-size: .66rem; color: var(--text-3); flex-shrink: 0; }
    .conv-prev  { font-size: .76rem; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .conv-prev.unread { color: var(--text); font-weight: 600; }
    .conv-badge {
      background: var(--green); color: #050505;
      border-radius: var(--radius-full); min-width: 17px; height: 17px;
      padding: 0 4px; font-size: .62rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .conv-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; height: 100%;
      color: var(--text-3); font-size: .83rem; text-align: center; padding: 20px;
    }
    .conv-empty i { font-size: 2.2rem; }

    /* ══ PANEL CHAT ══ */
    .chat-panel {
      display: flex; flex-direction: column;
      background: var(--bg); overflow: hidden;
    }
    .chat-empty-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--text-3); text-align: center; padding: 24px;
    }
    .chat-empty-screen i  { font-size: 3.5rem; }
    .chat-empty-screen h3 { font-size: .97rem; font-weight: 700; color: var(--text-2); }
    .chat-empty-screen p  { font-size: .83rem; line-height: 1.6; }

    /* Header chat */
    .chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface);
    }
    .btn-back {
      display: none; background: none; border: none;
      color: var(--text-2); font-size: 1.25rem; cursor: pointer; padding: 4px;
    }
    .ch-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; }
    .ch-info   { flex: 1; min-width: 0; cursor: pointer; }
    .ch-name   { font-weight: 800; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-sub    { font-size: .71rem; color: var(--text-3); }

    /* Mensajes */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px 14px 6px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }

    /* Separador de fecha */
    .msg-date-sep {
      text-align: center; font-size: .68rem; color: var(--text-3);
      padding: 8px 0 4px; font-weight: 600; letter-spacing: .3px;
      flex-shrink: 0;
    }

    /* Fila de mensaje */
    .msg-wrap {
      display: flex; align-items: flex-end; gap: 6px; max-width: 78%;
    }
    .msg-wrap.mine   { align-self: flex-end;   flex-direction: row-reverse; }
    .msg-wrap.theirs { align-self: flex-start; flex-direction: row; }
    .msg-wrap.gap-top { margin-top: 6px; }

    .msg-av-sm {
      width: 24px; height: 24px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .msg-av-hidden { visibility: hidden; }

    .msg-col { display: flex; flex-direction: column; gap: 1px; min-width: 0; }

    .msg-bubble {
      padding: 7px 11px; border-radius: 16px;
      font-size: .875rem; line-height: 1.45;
      word-break: break-word; max-width: 100%;
    }
    .mine   .msg-bubble { background: var(--green); color: #050505; border-bottom-right-radius: 4px; }
    .theirs .msg-bubble { background: var(--surface3); color: var(--text); border-bottom-left-radius: 4px; }

    /* Media en burbuja */
    .msg-media-img {
      max-width: 210px; max-height: 260px;
      border-radius: 10px; display: block;
      cursor: pointer; object-fit: cover;
    }
    .msg-media-video { max-width: 210px; border-radius: 10px; display: block; }
    .bubble-media-only { padding: 3px !important; background: transparent !important; }

    /* Meta */
    .msg-meta {
      display: flex; align-items: center; gap: 3px;
      margin-top: 1px;
    }
    .mine   .msg-meta { justify-content: flex-end; }
    .theirs .msg-meta { justify-content: flex-start; }
    .msg-time   { font-size: .63rem; color: var(--text-3); }
    .mine .msg-time { color: rgba(0,0,0,.35); }
    .msg-status { font-size: .63rem; color: rgba(0,0,0,.35); display: flex; align-items: center; gap: 2px; }
    .msg-status.leido { color: #1a6b2a; font-weight: 700; }

    /* Typing */
    .typing-row {
      padding: 4px 14px 2px; min-height: 22px; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--text-3);
    }
    .typing-dots span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--text-3); border-radius: 50%;
      animation: tdot .8s infinite;
      margin-right: 2px;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes tdot { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }

    /* Preview media antes de enviar */
    .media-preview-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px 0; flex-shrink: 0;
    }
    .media-preview-bar .pv-thumb {
      position: relative; width: 58px; height: 58px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--surface2); flex-shrink: 0;
    }
    .media-preview-bar .pv-thumb img,
    .media-preview-bar .pv-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .pv-remove {
      position: absolute; top: 2px; right: 2px;
      background: rgba(0,0,0,.75); border: none; color: #fff;
      width: 17px; height: 17px; border-radius: 50%;
      font-size: .65rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .media-preview-bar small { font-size: .73rem; color: var(--text-3); }

    /* Input bar */
    .chat-input-bar {
      padding: 9px 12px 12px; border-top: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface);
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }
    .chat-input-row { display: flex; align-items: flex-end; gap: 7px; }
    .btn-attach {
      background: none; border: none; color: var(--text-3);
      font-size: 1.3rem; cursor: pointer; padding: 6px;
      border-radius: 50%; transition: all .15s; flex-shrink: 0;
    }
    .btn-attach:hover { color: var(--green); background: var(--green-dim); }
    .chat-input {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius-full);
      color: var(--text); padding: 9px 15px;
      font-size: .88rem; outline: none; resize: none;
      max-height: 110px; overflow-y: auto; line-height: 1.4;
      transition: border-color .15s; font-family: inherit;
    }
    .chat-input:focus { border-color: rgba(92,219,111,.35); }
    .chat-input::placeholder { color: var(--text-3); }
    .chat-input::-webkit-scrollbar { display: none; }
    .btn-send {
      background: var(--green); border: none; color: #050505;
      width: 37px; height: 37px; border-radius: 50%;
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, transform .1s;
    }
    .btn-send:hover    { background: #4ec261; }
    .btn-send:active   { transform: scale(.88); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }

    /* Modal media full */
    .media-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.96);
      z-index: 600; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
    .media-modal.hidden { display: none; }
    .media-modal img   { max-width: 95vw; max-height: 95dvh; border-radius: var(--radius); object-fit: contain; }
    .media-modal video { max-width: 95vw; max-height: 95dvh; border-radius: var(--radius); }
    .close-modal {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,.1); border: none; color: #fff;
      width: 38px; height: 38px; border-radius: 50%; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* Loading */
    .msgs-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px;
      flex: 1; color: var(--text-3); font-size: .85rem;
    }
    .spin { display: inline-block; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav { display: none; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .msg-layout { grid-template-columns: 66px 260px 1fr; }
      .sidebar .nav-item span:last-child,
      .sidebar .logo span,
      .sidebar-user strong,
      .sidebar-user small { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .nav-icon  { width: auto; font-size: 1.35rem; }
    }
    @media (max-width: 640px) {
      .msg-layout { grid-template-columns: 1fr; }
      .sidebar     { display: none; }
      .conv-panel  {
        position: fixed; inset: 0; z-index: 10;
        transition: transform .3s ease;
      }
      .conv-panel.off  { transform: translateX(-100%); pointer-events: none; }
      .chat-panel {
        position: fixed; inset: 0; z-index: 10;
        transition: transform .3s ease;
      }
      .chat-panel.off  { transform: translateX(100%); pointer-events: none; }
      .btn-back   { display: flex; }
      .bottom-nav {
        display: block; position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--surface); border-top: 1px solid var(--border);
        z-index: 20; padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .bottom-nav-inner {
        display: flex; align-items: center; justify-content: space-around;
        padding: 6px 0 2px;
      }
      .bottom-nav-btn {
        display: flex; flex-direction: column; align-items: center; gap: 2px;
        color: var(--text-3); text-decoration: none;
        font-size: .6rem; font-weight: 600; padding: 4px 12px;
        border-radius: var(--radius); transition: color .15s;
      }
      .bottom-nav-btn.active { color: var(--green); }
      .bottom-nav-btn .bn-icon { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="msg-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo">
      <i class="ri-leaf-fill"></i>
      <span>Foro Ubre</span>
    </div>
    <a href="/"             class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html"  class="nav-item"><span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span></a>
    <a href="videos.html"   class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html" class="nav-item active"><span class="nav-icon"><i class="ri-message-3-fill"></i></span><span>Mensajes</span></a>
    <a href="#" class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- ══ PANEL CONVS ══ -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-header">
      <h2><i class="ri-message-3-fill" style="color:var(--green);margin-right:5px;vertical-align:middle"></i>Mensajes</h2>
      <div class="conv-search">
        <i class="ri-search-line"></i>
        <input type="text" id="searchConvInput" placeholder="Buscar..."
               oninput="filtrarConvs(this.value)"/>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">
        <i class="ri-loader-4-line spin" style="color:var(--green)"></i>
        Cargando...
      </div>
    </div>
  </div>

  <!-- ══ PANEL CHAT ══ -->
  <div class="chat-panel off" id="chatPanel">
    <div class="chat-empty-screen" id="chatEmptyScreen">
      <i class="ri-message-3-line"></i>
      <h3>Tus mensajes</h3>
      <p>Selecciona una conversación<br/>o ve a un perfil y toca "Mensaje".</p>
    </div>
  </div>

</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"             class="bottom-nav-btn"><span class="bn-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html"  class="bottom-nav-btn"><span class="bn-icon"><i class="ri-search-line"></i></span><span>Buscar</span></a>
    <a href="videos.html"   class="bottom-nav-btn"><span class="bn-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html" class="bottom-nav-btn active"><span class="bn-icon"><i class="ri-message-3-fill"></i></span><span>Mensajes</span></a>
    <a href="#" class="bottom-nav-btn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<!-- ══ MODAL MEDIA ══ -->
<div class="media-modal hidden" id="mediaModal" onclick="cerrarMediaModal()">
  <button class="close-modal" onclick="cerrarMediaModal()"><i class="ri-close-line"></i></button>
  <div id="mediaModalInner"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
const API   = "/api";
const token = localStorage.getItem("fu_token");
const yo    = JSON.parse(localStorage.getItem("fu_usuario") || "null");
if (!token || !yo) { window.location.href = "/login.html"; }

document.getElementById("navPerfil").href = `profile.html?handle=${yo.handle}`;
document.getElementById("bnPerfil").href  = `profile.html?handle=${yo.handle}`;

// Sidebar user
(function() {
  const av = yo.avatarTipo === "video"
    ? `<video src="${yo.avatar}" autoplay loop muted playsinline style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0"></video>`
    : `<img src="${yo.avatar}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`;
  document.getElementById("sidebarUser").innerHTML = `${av}
    <div style="min-width:0">
      <strong>${esc(yo.nombre)}</strong>
      <small>@${esc(yo.handle)}</small>
    </div>`;
})();

/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
let convs       = [];
let convActiva  = null;
let mediaFile   = null;
let typingTimer = null;
let socket      = null;

/* ═══════════════════════════════════════
   SOCKET
═══════════════════════════════════════ */
try {
  socket = io({ transports: ["websocket","polling"] });
  socket.emit("registrar", yo._id);

  socket.on("nuevoMensaje", ({ convId, mensaje }) => {
    actualizarConvEnLista(convId, mensaje);
    if (convActiva === convId) {
      appendMensaje(mensaje);
      marcarLeido(convId, true);
    } else {
      subirBadge(convId);
    }
  });

  socket.on("usuarioEscribiendo", ({ convId }) => {
    if (convActiva === convId) setTyping(true);
  });
  socket.on("usuarioDejoEscribir", ({ convId }) => {
    if (convActiva === convId) setTyping(false);
  });
  socket.on("mensajesLeidos", ({ convId }) => {
    if (convActiva === convId) actualizarVisto();
  });
} catch(e) {
  console.warn("Socket no disponible:", e.message);
}

/* ═══════════════════════════════════════
   CONVERSACIONES — CARGAR
═══════════════════════════════════════ */
async function cargarConversaciones() {
  try {
    const res = await fetch(`${API}/messages`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    convs = await res.json();
    renderConvList(convs);

    const paramConv = new URLSearchParams(location.search).get("conv");
    if (paramConv) abrirConv(paramConv);
  } catch(e) {
    console.error("cargarConversaciones:", e);
    document.getElementById("convList").innerHTML = `
      <div class="conv-empty">
        <i class="ri-error-warning-line" style="color:var(--red)"></i>
        Error al cargar
      </div>`;
  }
}

function renderConvList(lista) {
  const el = document.getElementById("convList");
  if (!lista.length) {
    el.innerHTML = `
      <div class="conv-empty">
        <i class="ri-message-3-line"></i>
        Sin mensajes aún.<br/>Ve a un perfil y toca "Mensaje".
      </div>`;
    return;
  }
  el.innerHTML = lista.map(convItemHTML).join("");
}

function convItemHTML(c) {
  const otro = c.otro || {};
  const av   = otro.avatarTipo === "video"
    ? `<video src="${otro.avatar||''}" autoplay loop muted playsinline></video>`
    : `<img src="${otro.avatar||''}" alt=""/>`;

  let prev = "Toca para chatear";
  if (c.ultimoMensaje) {
    const esM = (c.ultimoMensaje.autor?._id || c.ultimoMensaje.autor || "").toString() === yo._id;
    const mt  = c.ultimoMensaje.mediaTipo;
    const tx  = c.ultimoMensaje.texto || "";
    if (mt === "imagen")     prev = (esM ? "Tú: " : "") + "📷 Foto";
    else if (mt === "video") prev = (esM ? "Tú: " : "") + "🎥 Video";
    else if (tx)             prev = (esM ? "Tú: " : "") + tx;
  }

  const hora = c.ultimoMensaje?.createdAt ? tiempoCorto(c.ultimoMensaje.createdAt) : "";

  return `
    <div class="conv-item ${convActiva === c._id ? 'active' : ''}"
         id="ci-${c._id}" onclick="abrirConv('${c._id}')">
      <div class="conv-av">${av}</div>
      <div class="conv-info">
        <div class="conv-name-row">
          <span class="conv-name">${esc(otro.nombre || "?")}</span>
          <span class="conv-time">${hora}</span>
        </div>
        <div class="conv-prev ${c.noLeidos > 0 ? 'unread' : ''}">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(prev)}</span>
          ${c.noLeidos > 0
            ? `<span class="conv-badge" id="badge-${c._id}">${c.noLeidos}</span>`
            : `<span id="badge-${c._id}"></span>`}
        </div>
      </div>
    </div>`;
}

function filtrarConvs(q) {
  if (!q.trim()) { renderConvList(convs); return; }
  const f = q.toLowerCase();
  renderConvList(convs.filter(c =>
    (c.otro?.nombre || "").toLowerCase().includes(f) ||
    (c.otro?.handle || "").toLowerCase().includes(f)
  ));
}

/* ═══════════════════════════════════════
   ABRIR CONVERSACIÓN
═══════════════════════════════════════ */
async function abrirConv(convId) {
  convActiva = convId;
  mediaFile  = null;

  // Activar en lista
  document.querySelectorAll(".conv-item").forEach(el =>
    el.classList.toggle("active", el.id === `ci-${convId}`)
  );

  // Mobile: mostrar chat
  document.getElementById("convPanel").classList.add("off");
  document.getElementById("chatPanel").classList.remove("off");

  const conv = convs.find(c => c._id === convId);
  const otro = conv?.otro || {};

  // Construir chat UI
  document.getElementById("chatPanel").innerHTML = `
    <div class="chat-header">
      <button class="btn-back" onclick="volverALista()">
        <i class="ri-arrow-left-line"></i>
      </button>
      ${otro.avatarTipo === "video"
        ? `<video src="${otro.avatar||''}" class="ch-avatar" autoplay loop muted playsinline
                  onclick="ir('profile.html?handle=${esc(otro.handle)}')"></video>`
        : `<img src="${otro.avatar||''}" class="ch-avatar" alt=""
                onclick="ir('profile.html?handle=${esc(otro.handle)}')"/>`}
      <div class="ch-info" onclick="ir('profile.html?handle=${esc(otro.handle)}')">
        <div class="ch-name">${esc(otro.nombre || "?")}</div>
        <div class="ch-sub">@${esc(otro.handle || "")}</div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="msgs-loading">
        <i class="ri-loader-4-line spin" style="font-size:1.4rem;color:var(--green)"></i>
        Cargando mensajes...
      </div>
    </div>

    <div class="typing-row" id="typingRow" style="visibility:hidden">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      escribiendo...
    </div>

    <div class="media-preview-bar hidden" id="mediaPreviewBar"></div>

    <div class="chat-input-bar">
      <div class="chat-input-row">
        <label for="mediaFileInput" class="btn-attach" title="Foto o video">
          <i class="ri-image-add-line"></i>
        </label>
        <input type="file" id="mediaFileInput"
               accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm"
               hidden onchange="onMediaSelected(this)"/>
        <textarea class="chat-input" id="chatInput"
                  placeholder="Escribe un mensaje..."
                  rows="1"
                  oninput="autoResize(this); onTyping()"
                  onkeydown="onKeydown(event)"></textarea>
        <button class="btn-send" id="btnSend" onclick="enviarMensaje()">
          <i class="ri-send-plane-fill"></i>
        </button>
      </div>
    </div>
  `;

  await cargarMensajes(convId);
  marcarLeido(convId, false);
  document.getElementById("chatInput")?.focus();
}

function volverALista() {
  convActiva = null;
  document.getElementById("convPanel").classList.remove("off");
  document.getElementById("chatPanel").classList.add("off");
}

/* ═══════════════════════════════════════
   CARGAR MENSAJES
═══════════════════════════════════════ */
async function cargarMensajes(convId) {
  const box = document.getElementById("chatMessages");
  if (!box) return;

  try {
    const res = await fetch(`${API}/messages/${convId}?limite=60`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.mensaje || `HTTP ${res.status}`);
    }

    const msgs = await res.json();
    box.innerHTML = "";

    if (!msgs.length) {
      box.innerHTML = `
        <div style="text-align:center;color:var(--text-3);font-size:.82rem;padding:32px 0">
          <i class="ri-chat-smile-3-line" style="font-size:2rem;display:block;margin-bottom:8px"></i>
          Sin mensajes. ¡Di hola! 👋
        </div>`;
      return;
    }

    renderMensajes(msgs, box);
    box.scrollTop = box.scrollHeight;

  } catch(e) {
    console.error("cargarMensajes:", e);
    if (box) box.innerHTML = `
      <div class="msgs-loading" style="color:var(--red)">
        <i class="ri-error-warning-line" style="font-size:1.5rem"></i>
        ${esc(e.message)}
      </div>`;
  }
}

/* ═══════════════════════════════════════
   RENDER MENSAJES — LÓGICA SIMPLE
═══════════════════════════════════════ */
function renderMensajes(msgs, box) {
  box.innerHTML = "";
  let lastDateStr = null;
  let lastAutorId = null;
  let lastTime    = 0;

  msgs.forEach(msg => {
    const mio     = esMio(msg);
    const autorId = getAutorId(msg);
    const msgDate = new Date(msg.createdAt).toLocaleDateString("es", {
      weekday: "long", day: "numeric", month: "long"
    });

    // Separador de fecha
    if (msgDate !== lastDateStr) {
      lastDateStr = msgDate;
      lastAutorId = null;
      lastTime    = 0;
      const sep   = document.createElement("div");
      sep.className   = "msg-date-sep";
      sep.textContent = msgDate;
      box.appendChild(sep);
    }

    // ¿Mismo autor, mismo bloque (<2 min)?
    const msgTime   = new Date(msg.createdAt).getTime();
    const mismoBloque = autorId === lastAutorId && (msgTime - lastTime) < 120000;
    const showAv    = !mismoBloque && !mio;

    lastAutorId = autorId;
    lastTime    = msgTime;

    box.appendChild(buildMsgWrap(msg, mio, showAv, !mismoBloque));
  });
}

function buildMsgWrap(msg, mio, showAv, gapTop) {
  const autor  = msg.autor || {};
  const wrap   = document.createElement("div");
  wrap.className = `msg-wrap ${mio ? "mine" : "theirs"}${gapTop ? " gap-top" : ""}`;
  wrap.id = `msg-${msg._id}`;

  // Avatar de quien envía (solo theirs, solo cuando cambia de bloque)
  if (!mio) {
    const avEl = document.createElement(autor.avatarTipo === "video" ? "video" : "img");
    avEl.src   = autor.avatar || "";
    avEl.className = `msg-av-sm${showAv ? "" : " msg-av-hidden"}`;
    if (autor.avatarTipo === "video") { avEl.autoplay = true; avEl.loop = true; avEl.muted = true; avEl.setAttribute("playsinline",""); }
    wrap.appendChild(avEl);
  }

  // Columna (burbuja + meta)
  const col    = document.createElement("div");
  col.className = "msg-col";

  // Burbuja
  const bubble = document.createElement("div");
  const soloMedia = msg.mediaUrl && !msg.texto;
  bubble.className = `msg-bubble${soloMedia ? " bubble-media-only" : ""}`;

  if (msg.mediaUrl) {
    if (msg.mediaTipo === "video") {
      bubble.innerHTML += `
        <video src="${msg.mediaUrl}" class="msg-media-video" controls playsinline
               onclick="event.stopPropagation()"></video>`;
    } else {
      bubble.innerHTML += `
        <img src="${msg.mediaUrl}" class="msg-media-img" alt="foto"
             onclick="verMedia('${msg.mediaUrl}','imagen')"/>`;
    }
  }

  if (msg.texto) {
    const span = document.createElement("span");
    span.textContent = msg.texto;
    bubble.appendChild(span);
  }

  col.appendChild(bubble);

  // Meta (hora + estado)
  const meta = document.createElement("div");
  meta.className = "msg-meta";
  const hora = document.createElement("span");
  hora.className   = "msg-time";
  hora.textContent = horaFmt(msg.createdAt);
  meta.appendChild(hora);

  if (mio) {
    const status = document.createElement("span");
    status.id          = `status-${msg._id}`;
    status.className   = `msg-status${msg.leido ? " leido" : ""}`;
    status.innerHTML   = msg.leido
      ? `<i class="ri-check-double-line"></i> Visto`
      : `<i class="ri-check-line"></i>`;
    meta.appendChild(status);
  }

  col.appendChild(meta);
  wrap.appendChild(col);
  return wrap;
}

/* ═══════════════════════════════════════
   ENVIAR MENSAJE
═══════════════════════════════════════ */
async function enviarMensaje() {
  const inputEl = document.getElementById("chatInput");
  const texto   = inputEl?.value.trim() || "";
  if (!texto && !mediaFile) return;
  if (!convActiva) return;

  const btnSend = document.getElementById("btnSend");
  if (btnSend) btnSend.disabled = true;

  // Detener typing
  emitDejoEscribir();

  try {
    const fd = new FormData();
    if (texto)     fd.append("texto", texto);
    if (mediaFile) fd.append("media", mediaFile);

    const res  = await fetch(`${API}/messages/${convActiva}`, {
      method:  "POST",
      headers: { Authorization: `Bearer ${token}` },
      body:    fd
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.mensaje || "Error");

    // Limpiar
    if (inputEl) { inputEl.value = ""; inputEl.style.height = "auto"; }
    limpiarMediaPreview();

    // Mostrar en chat
    appendMensaje(data);

    // Socket → avisar al otro
    const conv   = convs.find(c => c._id === convActiva);
    const otroId = conv?.otro?._id;
    if (socket && otroId) {
      socket.emit("enviarMensaje", { convId: convActiva, mensaje: data, destinatarioId: otroId });
    }

    actualizarConvEnLista(convActiva, data);

  } catch(e) {
    alert("Error al enviar: " + e.message);
  } finally {
    if (btnSend) btnSend.disabled = false;
    inputEl?.focus();
  }
}

function appendMensaje(msg) {
  const box = document.getElementById("chatMessages");
  if (!box) return;
  box.querySelector("[style*='Sin mensajes']")?.remove();

  const mio  = esMio(msg);
  const node = buildMsgWrap(msg, mio, !mio, true);
  box.appendChild(node);
  box.scrollTop = box.scrollHeight;
}

/* ═══════════════════════════════════════
   MARCAR LEÍDO
═══════════════════════════════════════ */
async function marcarLeido(convId, silencioso) {
  try {
    await fetch(`${API}/messages/${convId}/read`, {
      method: "PUT", headers: { Authorization: `Bearer ${token}` }
    });
    const badge = document.getElementById(`badge-${convId}`);
    if (badge) { badge.textContent = ""; }
    document.querySelector(`#ci-${convId} .conv-prev`)?.classList.remove("unread");

    if (!silencioso && socket) {
      const conv   = convs.find(c => c._id === convId);
      const otroId = conv?.otro?._id;
      if (otroId) socket.emit("mensajesLeidos", { convId, destinatarioId: otroId });
    }
  } catch(_) {}
}

function actualizarVisto() {
  document.querySelectorAll("[id^='status-']").forEach(el => {
    el.className = "msg-status leido";
    el.innerHTML = `<i class="ri-check-double-line"></i> Visto`;
  });
}

/* ═══════════════════════════════════════
   TYPING
═══════════════════════════════════════ */
function onTyping() {
  if (!socket || !convActiva) return;
  const conv   = convs.find(c => c._id === convActiva);
  const otroId = conv?.otro?._id;
  if (!otroId) return;
  socket.emit("escribiendo", { convId: convActiva, nombre: yo.nombre, destinatarioId: otroId });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => emitDejoEscribir(), 1800);
}

function emitDejoEscribir() {
  if (!socket || !convActiva) return;
  const conv   = convs.find(c => c._id === convActiva);
  const otroId = conv?.otro?._id;
  if (otroId) socket.emit("dejoDeEscribir", { convId: convActiva, destinatarioId: otroId });
}

function setTyping(show) {
  const el = document.getElementById("typingRow");
  if (el) el.style.visibility = show ? "visible" : "hidden";
}

/* ═══════════════════════════════════════
   MEDIA
═══════════════════════════════════════ */
function onMediaSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 25 * 1024 * 1024) { alert("Máximo 25MB"); input.value = ""; return; }
  mediaFile = file;
  const url  = URL.createObjectURL(file);
  const bar  = document.getElementById("mediaPreviewBar");
  if (!bar) return;
  const esV  = file.type.startsWith("video/");
  bar.classList.remove("hidden");
  bar.innerHTML = `
    <div class="pv-thumb">
      ${esV ? `<video src="${url}" muted></video>` : `<img src="${url}" alt=""/>`}
      <button class="pv-remove" onclick="limpiarMediaPreview()">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <small>${esV ? "🎥 Video" : "📷 Foto"} · ${(file.size/1024/1024).toFixed(1)}MB</small>
  `;
}

function limpiarMediaPreview() {
  mediaFile = null;
  const bar   = document.getElementById("mediaPreviewBar");
  const input = document.getElementById("mediaFileInput");
  if (bar)   { bar.classList.add("hidden"); bar.innerHTML = ""; }
  if (input) input.value = "";
}

function verMedia(url, tipo) {
  const modal = document.getElementById("mediaModal");
  const inner = document.getElementById("mediaModalInner");
  modal.classList.remove("hidden");
  if (tipo === "video") {
    inner.innerHTML = `<video src="${url}" controls autoplay playsinline
                              onclick="event.stopPropagation()"
                              style="max-width:95vw;max-height:95dvh;border-radius:14px"></video>`;
  } else {
    inner.innerHTML = `<img src="${url}" onclick="event.stopPropagation()" alt=""/>`;
  }
}

function cerrarMediaModal() {
  document.getElementById("mediaModal").classList.add("hidden");
  document.getElementById("mediaModalInner").innerHTML = "";
}

/* ═══════════════════════════════════════
   ACTUALIZAR LISTA DE CONVS
═══════════════════════════════════════ */
function actualizarConvEnLista(convId, msg) {
  const idx = convs.findIndex(c => c._id === convId);
  if (idx === -1) return;
  convs[idx].ultimoMensaje = msg;
  if (!esMio(msg)) convs[idx].noLeidos = (convs[idx].noLeidos || 0) + 1;
  convs.unshift(convs.splice(idx, 1)[0]);
  renderConvList(convs);
}

function subirBadge(convId) {
  const badge = document.getElementById(`badge-${convId}`);
  if (!badge) return;
  const n = parseInt(badge.textContent || "0") + 1;
  badge.textContent  = String(n);
  badge.style.display = "flex";
  document.querySelector(`#ci-${convId} .conv-prev`)?.classList.add("unread");
}

/* ═══════════════════════════════════════
   INPUT HELPERS
═══════════════════════════════════════ */
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 110) + "px";
}

function onKeydown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    enviarMensaje();
  }
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esMio(msg) {
  const id = msg.autor?._id?.toString() || msg.autor?.toString() || "";
  return id === yo._id;
}
function getAutorId(msg) {
  return msg.autor?._id?.toString() || msg.autor?.toString() || "";
}
function esc(s = "") {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function horaFmt(f) {
  return new Date(f).toLocaleTimeString("es", { hour:"2-digit", minute:"2-digit" });
}
function tiempoCorto(f) {
  const d = (Date.now() - new Date(f)) / 1000;
  if (d < 60)    return "ahora";
  if (d < 3600)  return `${Math.floor(d/60)}m`;
  if (d < 86400) return `${Math.floor(d/3600)}h`;
  return new Date(f).toLocaleDateString("es", { day:"numeric", month:"short" });
}
function ir(url) { window.location.href = url; }

document.addEventListener("keydown", e => {
  if (e.key === "Escape") cerrarMediaModal();
});

/* ═══ INIT ═══ */
cargarConversaciones();
</script>
</body>
</html>
