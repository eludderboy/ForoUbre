<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>Foro Ubre — Mensajes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #080808;
  --surface:      #101010;
  --surface-2:    #161616;
  --surface-3:    #1c1c1c;
  --border:       #1e1e1e;
  --border-2:     #2a2a2a;
  --text:         #f0f0f0;
  --text-2:       #a0a0a0;
  --text-3:       #505050;
  --green:        #5cdb6f;
  --green-dk:     #4bc45e;
  --green-glow:   rgba(92,219,111,0.15);
  --green-subtle: rgba(92,219,111,0.08);
  --red:          #ff4466;
  --red-subtle:   rgba(255,68,102,0.1);
  --orange:       #f59e0b;
  --radius-sm:    8px;
  --radius:       14px;
  --radius-lg:    22px;
  --radius-full:  999px;
  --shadow:       0 4px 24px rgba(0,0,0,0.4);
  --shadow-green: 0 0 20px rgba(92,219,111,0.12);
  --transition:   0.18s cubic-bezier(0.4,0,0.2,1);
  --bnav-h:       54px;
}

html, body {
  height: 100dvh; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 15px; line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ══════════════════════════
   GRID 3 COLS
══════════════════════════ */
.msg-layout {
  display: grid;
  grid-template-columns: 250px 290px 1fr;
  height: 100dvh;
}

/* ══════════════════════════
   SIDEBAR (igual que index)
══════════════════════════ */
.sidebar {
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  padding: 20px 12px; gap: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { display: none; }
.logo {
  font-size: 1.6rem; font-weight: 900;
  color: var(--green); padding: 10px 14px 24px;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; border-radius: var(--radius-full);
  font-size: 0.97rem; font-weight: 500; color: var(--text-2);
  transition: all var(--transition); white-space: nowrap;
}
.nav-item:hover  { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--green-subtle); color: var(--green); font-weight: 700; }
.nav-item .nav-icon { font-size: 1.1rem; flex-shrink: 0; width: 24px; text-align: center; }
.nav-badge {
  background: var(--green); color: #050505;
  border-radius: var(--radius-full); min-width: 18px; height: 18px;
  padding: 0 5px; font-size: 0.68rem; font-weight: 900;
  display: inline-flex; align-items: center; justify-content: center; margin-left: auto;
}
.btn-post-sidebar {
  margin-top: 16px; background: var(--green); color: #050505;
  border: none; border-radius: var(--radius-full);
  padding: 13px 20px; font-size: 0.93rem; font-weight: 800;
  letter-spacing: 0.2px; transition: all var(--transition);
  box-shadow: var(--shadow-green); width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit; cursor: pointer;
}
.btn-post-sidebar:hover { background: var(--green-dk); transform: translateY(-1px); }
.sidebar-user {
  margin-top: auto;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 10px; border-radius: var(--radius);
  cursor: pointer; transition: background var(--transition); overflow: hidden;
}
.sidebar-user:hover { background: var(--surface-2); }
.sidebar-user img, .sidebar-user video {
  width: 38px; height: 38px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0; background: var(--surface-3);
}
.sidebar-user strong {
  font-size: 0.87rem; font-weight: 700;
  display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-user small { color: var(--text-3); font-size: 0.75rem; }

/* ══════════════════════════
   PANEL CONVERSACIONES
══════════════════════════ */
.conv-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
}
.conv-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.conv-header h2 {
  font-size: 1.05rem; font-weight: 800;
  letter-spacing: -0.3px; margin-bottom: 10px;
}
.srch { position: relative; }
.srch i {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--text-3);
  font-size: .9rem; pointer-events: none;
}
.srch input {
  width: 100%; background: var(--surface-2);
  border: 1px solid var(--border-2); border-radius: var(--radius-full);
  color: var(--text); padding: 8px 14px 8px 34px;
  font-size: .84rem; outline: none; font-family: inherit;
  transition: border-color var(--transition);
}
.srch input:focus { border-color: var(--green); }
.srch input::placeholder { color: var(--text-3); }
.conv-list { flex: 1; overflow-y: auto; min-height: 0; }
.conv-list::-webkit-scrollbar { display: none; }

.conv-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  transition: background var(--transition);
  border-bottom: 1px solid var(--border);
}
.conv-item:hover  { background: var(--surface-2); }
.conv-item.active { background: var(--green-subtle); }
.cav { flex-shrink: 0; }
.cav img, .cav video {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; display: block;
}
.conv-info { flex: 1; min-width: 0; }
.cnr {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 2px;
}
.cname {
  font-size: .88rem; font-weight: 700;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 140px;
}
.ctime { font-size: .68rem; color: var(--text-3); flex-shrink: 0; }
.cprev {
  font-size: .78rem; color: var(--text-3);
  display: flex; align-items: center; gap: 4px;
}
.cprev span:first-child {
  flex: 1; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.cprev.unread { color: var(--text); font-weight: 600; }
.cbadge {
  background: var(--green); color: #050505;
  border-radius: var(--radius-full); min-width: 18px; height: 18px;
  padding: 0 5px; font-size: .65rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.conv-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; height: 100%;
  color: var(--text-3); font-size: .84rem; text-align: center; padding: 24px;
}
.conv-empty i { font-size: 2.5rem; }

/* ══════════════════════════
   PANEL CHAT
══════════════════════════ */
.chat-panel {
  display: flex; flex-direction: column;
  background: var(--bg);
  height: 100dvh; overflow: hidden; min-width: 0;
}
.chat-screen-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; color: var(--text-3); text-align: center; padding: 24px;
}
.chat-screen-empty i  { font-size: 3.5rem; }
.chat-screen-empty h3 { font-size: .97rem; font-weight: 700; color: var(--text-2); }
.chat-screen-empty p  { font-size: .84rem; line-height: 1.6; }

/* Header chat */
.chat-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; min-height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.btn-back {
  display: none; background: none; border: none;
  color: var(--text-2); font-size: 1.25rem;
  cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1;
}
.hdr-av {
  width: 38px; height: 38px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0; cursor: pointer; display: block;
  background: var(--surface-3);
}
.hdr-info { flex: 1; min-width: 0; cursor: pointer; }
.hdr-name {
  font-weight: 800; font-size: .92rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hdr-sub { font-size: .73rem; color: var(--text-3); }

/* ══ MENSAJES ══ */
.chat-msgs {
  flex: 1; min-height: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 14px 16px 8px;
  display: flex; flex-direction: column; gap: 1px;
}
.chat-msgs::-webkit-scrollbar { width: 3px; }
.chat-msgs::-webkit-scrollbar-thumb {
  background: var(--border-2); border-radius: 4px;
}

.date-sep {
  text-align: center; font-size: .7rem; color: var(--text-3);
  padding: 8px 0 4px; font-weight: 600; flex-shrink: 0;
}

/* ══ BURBUJAS ══ */
.mw {
  display: flex; align-items: flex-end; gap: 6px; max-width: 80%;
}
.mw.mine   { align-self: flex-end;   flex-direction: row-reverse; }
.mw.theirs { align-self: flex-start; flex-direction: row; }
.mw.gt     { margin-top: 8px; }

.mav {
  width: 28px; height: 28px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0; display: block;
  background: var(--surface-3);
}
.mav.hidden-av { visibility: hidden; }

.mcol { display: flex; flex-direction: column; gap: 1px; min-width: 0; max-width: 100%; }

.bubble {
  padding: 9px 13px; border-radius: 18px;
  font-size: .9rem; line-height: 1.5;
  word-break: break-word; white-space: pre-wrap;
}
.mw.mine   .bubble {
  background: var(--green); color: #050505;
  border-bottom-right-radius: 4px;
}
.mw.theirs .bubble {
  background: var(--surface-3); color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border-2);
}
.bubble.only { padding: 3px; background: transparent !important; border: none !important; }

.bmedia-img {
  max-width: 220px; max-height: 270px;
  border-radius: var(--radius-sm); display: block;
  cursor: pointer; object-fit: cover;
}
.bmedia-vid { max-width: 220px; border-radius: var(--radius-sm); display: block; }

.mmeta { display: flex; align-items: center; gap: 3px; margin-top: 2px; }
.mw.mine   .mmeta { justify-content: flex-end; }
.mw.theirs .mmeta { justify-content: flex-start; }
.mtime { font-size: .64rem; color: var(--text-3); }
.mw.mine .mtime { color: rgba(0,0,0,.4); }
.mst {
  font-size: .64rem; color: rgba(0,0,0,.4);
  display: flex; align-items: center; gap: 2px;
}
.mst.leido { color: #1a7a2e; font-weight: 700; }

/* ══ TYPING ══ */
.typing-row {
  padding: 3px 16px; min-height: 22px; flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  font-size: .74rem; color: var(--text-3); visibility: hidden;
}
.typing-dots span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--text-3); border-radius: 50%;
  animation: tdot .8s infinite; margin-right: 2px;
}
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .30s; }
@keyframes tdot { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* ══ PREVIEW MEDIA ══ */
.mprev-bar {
  display: none; align-items: center; gap: 10px;
  padding: 8px 14px 0; flex-shrink: 0;
}
.mprev-bar.show { display: flex; }
.pthumb {
  position: relative; width: 62px; height: 62px;
  border-radius: var(--radius-sm); overflow: hidden;
  background: var(--surface-2); flex-shrink: 0;
}
.pthumb img, .pthumb video { width: 100%; height: 100%; object-fit: cover; }
.pthumb-rm {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,.8); border: none; color: #fff;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: .65rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.mprev-bar small { font-size: .75rem; color: var(--text-3); }

/* ══ BARRA DE ESCRITURA ══ */
.chat-ibar {
  flex-shrink: 0;
  padding: 8px 14px 10px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.irow { display: flex; align-items: flex-end; gap: 8px; }
.btn-att {
  background: none; border: none; color: var(--text-3);
  font-size: 1.2rem; cursor: pointer; padding: 7px;
  border-radius: 50%; transition: all var(--transition);
  flex-shrink: 0; line-height: 1;
}
.btn-att:hover { color: var(--green); background: var(--green-subtle); }
.cinput {
  flex: 1; background: var(--surface-2);
  border: 1px solid var(--border-2); border-radius: var(--radius-full);
  color: var(--text); padding: 9px 16px;
  font-size: .9rem; outline: none; resize: none;
  max-height: 100px; overflow-y: auto; line-height: 1.4;
  transition: border-color var(--transition); font-family: inherit;
}
.cinput:focus { border-color: rgba(92,219,111,.4); box-shadow: 0 0 0 3px var(--green-subtle); }
.cinput::placeholder { color: var(--text-3); }
.cinput::-webkit-scrollbar { display: none; }
.btn-snd {
  background: var(--green); border: none; color: #050505;
  width: 38px; height: 38px; border-radius: 50%;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), transform .1s;
  box-shadow: var(--shadow-green);
}
.btn-snd:hover    { background: var(--green-dk); }
.btn-snd:active   { transform: scale(.88); }
.btn-snd:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* ══ MODAL MEDIA ══ */
.mmmodal {
  position: fixed; inset: 0; background: rgba(0,0,0,.94);
  z-index: 600; display: flex;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeIn .2s ease;
}
.mmmodal.hidden { display: none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.mmmodal img   { max-width: 96vw; max-height: 96dvh; border-radius: var(--radius); object-fit: contain; }
.mmmodal video { max-width: 96vw; max-height: 96dvh; border-radius: var(--radius); }
.mmclose {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,.1); border: 1px solid var(--border-2);
  color: #fff; width: 38px; height: 38px; border-radius: 50%;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
.mmclose:hover { background: rgba(255,255,255,.2); }

/* ══ LOADING / EMPTY ══ */
.msgs-spin {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; flex: 1;
  color: var(--text-3); font-size: .86rem;
}
.spin { display: inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════
   BOTTOM NAV
══════════════════════════ */
.bnav { display: none; }

/* ══════════════════════════
   RESPONSIVE TABLET
══════════════════════════ */
@media (max-width: 1100px) {
  .msg-layout { grid-template-columns: 68px 290px 1fr; }
  .sidebar { padding: 16px 8px; align-items: center; }
  .logo { font-size: 1.5rem; padding: 10px 0 24px; justify-content: center; }
  .logo span { display: none; }
  .nav-item { justify-content: center; padding: 12px; width: 48px; height: 48px; }
  .nav-item span:not(.nav-icon) { display: none; }
  .nav-item .nav-icon { width: auto; }
  .btn-post-sidebar { width: 44px; height: 44px; padding: 0; justify-content: center; }
  .btn-post-sidebar span { display: none; }
  .sidebar-user div { display: none; }
}

/* ══════════════════════════
   RESPONSIVE MOBILE
══════════════════════════ */
@media (max-width: 768px) {
  .msg-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }

  .bnav {
    display: block;
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: rgba(8,8,8,.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bnav-inner {
    display: flex; align-items: center; justify-content: space-around;
    height: var(--bnav-h);
  }
  .nbtn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--text-3); text-decoration: none;
    font-size: .6rem; font-weight: 600; padding: 4px 12px;
    transition: color var(--transition);
  }
  .nbtn.active { color: var(--green); }
  .nbtn i { font-size: 1.3rem; }

  .conv-panel {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: calc(var(--bnav-h) + env(safe-area-inset-bottom, 0px));
    height: auto; z-index: 10;
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  .conv-panel.off { transform: translateX(-100%); pointer-events: none; }

  .chat-panel {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: calc(var(--bnav-h) + env(safe-area-inset-bottom, 0px));
    height: auto; z-index: 10;
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  .chat-panel.off { transform: translateX(100%); pointer-events: none; }

  .btn-back { display: flex !important; }
}
  </style>
</head>
<body>

<div class="msg-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
    <nav>
      <a href="/"             class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
      <a href="explore.html"  class="nav-item"><span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span></a>
      <a href="videos.html"   class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
      <a href="messages.html" class="nav-item active"><span class="nav-icon"><i class="ri-message-3-fill"></i></span><span>Mensajes</span></a>
      <a href="#" class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    </nav>
    <button class="btn-post-sidebar" onclick="window.location.href='/'">
      <i class="ri-quill-pen-line"></i><span>Nuevo post</span>
    </button>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- ══ PANEL CONVERSACIONES ══ -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-header">
      <h2><i class="ri-message-3-fill" style="color:var(--green);margin-right:6px;vertical-align:middle"></i>Mensajes</h2>
      <div class="srch">
        <i class="ri-search-line"></i>
        <input type="text" id="srchInput" placeholder="Buscar conversación..." oninput="filtrarConvs(this.value)"/>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">
        <i class="ri-loader-4-line spin" style="color:var(--green)"></i>
        Cargando...
      </div>
    </div>
  </div>

  <!-- ══ PANEL CHAT ══ -->
  <div class="chat-panel off" id="chatPanel">
    <div class="chat-screen-empty">
      <i class="ri-message-3-line"></i>
      <h3>Tus mensajes</h3>
      <p>Selecciona una conversación<br/>o ve a un perfil y toca "Mensaje".</p>
    </div>
  </div>

</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bnav">
  <div class="bnav-inner">
    <a href="/"             class="nbtn"><i class="ri-home-5-line"></i><span>Inicio</span></a>
    <a href="explore.html"  class="nbtn"><i class="ri-search-line"></i><span>Buscar</span></a>
    <a href="videos.html"   class="nbtn"><i class="ri-video-line"></i><span>Videos</span></a>
    <a href="messages.html" class="nbtn active"><i class="ri-message-3-fill"></i><span>Mensajes</span></a>
    <a href="#"             class="nbtn" id="bnPerfil"><i class="ri-user-3-line"></i><span>Perfil</span></a>
  </div>
</nav>

<!-- ══ MODAL MEDIA ══ -->
<div class="mmmodal hidden" id="mmmodal">
  <button class="mmclose" onclick="cerrarModal()"><i class="ri-close-line"></i></button>
  <div id="mminner"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ════════════════════════
   INIT
════════════════════════ */
const API   = "/api";
const token = localStorage.getItem("fu_token");
const yo    = JSON.parse(localStorage.getItem("fu_usuario") || "null");
if (!token || !yo) { window.location.href = "/login.html"; }

document.getElementById("navPerfil").href = `profile.html?handle=${yo.handle}`;
const _bnp = document.getElementById("bnPerfil");
if (_bnp) _bnp.href = `profile.html?handle=${yo.handle}`;

/* ── Sidebar user ── */
(function(){
  const el = document.getElementById("sidebarUser");
  if (!el) return;
  const av = yo.avatarTipo === "video"
    ? `<video src="${yo.avatar}" autoplay loop muted playsinline style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0"></video>`
    : `<img src="${yo.avatar||getDefaultAv(yo.nombre)}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`;
  el.innerHTML = `${av}<div style="min-width:0"><strong>${esc(yo.nombre)}</strong><small>@${esc(yo.handle)}</small></div>`;
})();

/* ════════════════════════
   FIX TECLADO MÓVIL
════════════════════════ */
function ajustarTeclado() {
  if (window.innerWidth > 768) return;
  const vv = window.visualViewport;
  if (!vv) return;
  const panel = document.getElementById("chatPanel");
  if (!panel || panel.classList.contains("off")) return;
  const bnavH = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--bnav-h")) || 54;
  const total = vv.height - bnavH;
  panel.style.height = total + "px";
  panel.style.top    = vv.offsetTop + "px";
  panel.style.bottom = "auto";
}
function resetTeclado() {
  if (window.innerWidth > 768) return;
  const panel = document.getElementById("chatPanel");
  if (!panel) return;
  panel.style.height = "";
  panel.style.top    = "";
  panel.style.bottom = "";
}
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", ajustarTeclado);
  window.visualViewport.addEventListener("scroll", ajustarTeclado);
}

/* ════════════════════════
   ESTADO
════════════════════════ */
let convs       = [];
let convActiva  = null;
let mediaFile   = null;
let typingTimer = null;
let socket      = null;

/* ════════════════════════
   SOCKET
════════════════════════ */
try {
  socket = io({ transports: ["polling","websocket"], upgrade: true, reconnectionAttempts: 5 });
  socket.on("connect",   () => socket.emit("registrar", yo._id));
  socket.on("reconnect", () => socket.emit("registrar", yo._id));
  socket.on("nuevoMensaje", ({ convId, mensaje }) => {
    actualizarConvEnLista(convId, mensaje);
    if (convActiva === convId) { appendMsg(mensaje); marcarLeido(convId, true); }
    else subirBadge(convId);
  });
  socket.on("usuarioEscribiendo",  ({ convId }) => { if (convActiva===convId) setTyping(true);  });
  socket.on("usuarioDejoEscribir", ({ convId }) => { if (convActiva===convId) setTyping(false); });
  socket.on("mensajesLeidos",      ({ convId }) => { if (convActiva===convId) marcarMsgsVisto(); });
} catch(e) { console.warn("Socket:", e.message); }

/* ════════════════════════
   CONVERSACIONES
════════════════════════ */
async function cargarConversaciones() {
  try {
    const res = await fetch(`${API}/messages`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    convs = await res.json();
    renderConvList(convs);
    const p = new URLSearchParams(location.search).get("conv");
    if (p) abrirConv(p);
  } catch(e) {
    console.error(e);
    document.getElementById("convList").innerHTML =
      `<div class="conv-empty"><i class="ri-error-warning-line" style="color:var(--red)"></i>Error al cargar</div>`;
  }
}

function renderConvList(lista) {
  const el = document.getElementById("convList");
  if (!lista.length) {
    el.innerHTML = `<div class="conv-empty"><i class="ri-message-3-line"></i>Sin mensajes aún.<br/>Ve a un perfil → "Mensaje".</div>`;
    return;
  }
  el.innerHTML = lista.map(htmlConvItem).join("");
}

function htmlConvItem(c) {
  const o  = c.otro || {};
  const av = o.avatarTipo === "video"
    ? `<video src="${o.avatar||''}" autoplay loop muted playsinline></video>`
    : `<img src="${o.avatar||getDefaultAv(o.nombre)}" alt=""/>`;

  let prev = "Toca para chatear";
  if (c.ultimoMensaje) {
    const esM  = getAutorId(c.ultimoMensaje) === yo._id;
    const tipo = c.ultimoMensaje.mediaTipo || c.ultimoMensaje.media?.tipo;
    const tx   = getTexto(c.ultimoMensaje);
    if      (tipo==="imagen") prev = (esM?"Tú: ":"") + "📷 Foto";
    else if (tipo==="video")  prev = (esM?"Tú: ":"") + "🎥 Video";
    else if (tx)              prev = (esM?"Tú: ":"") + tx;
  }
  const hora = c.ultimoMensaje?.createdAt ? tiempoCorto(c.ultimoMensaje.createdAt) : "";

  return `
    <div class="conv-item ${convActiva===c._id?"active":""}" id="ci-${c._id}" onclick="abrirConv('${c._id}')">
      <div class="cav">${av}</div>
      <div class="conv-info">
        <div class="cnr">
          <span class="cname">${esc(o.nombre||"?")}</span>
          <span class="ctime">${hora}</span>
        </div>
        <div class="cprev ${c.noLeidos>0?"unread":""}">
          <span>${esc(prev)}</span>
          ${c.noLeidos>0
            ? `<span class="cbadge" id="badge-${c._id}">${c.noLeidos}</span>`
            : `<span id="badge-${c._id}" style="display:none"></span>`}
        </div>
      </div>
    </div>`;
}

function filtrarConvs(q) {
  if (!q.trim()) { renderConvList(convs); return; }
  const f = q.toLowerCase();
  renderConvList(convs.filter(c =>
    (c.otro?.nombre||"").toLowerCase().includes(f) ||
    (c.otro?.handle||"").toLowerCase().includes(f)
  ));
}

/* ════════════════════════
   ABRIR CONV
════════════════════════ */
async function abrirConv(convId) {
  convActiva = convId;
  mediaFile  = null;

  document.querySelectorAll(".conv-item").forEach(el =>
    el.classList.toggle("active", el.id === `ci-${convId}`)
  );

  document.getElementById("convPanel").classList.add("off");
  const chatEl = document.getElementById("chatPanel");
  chatEl.classList.remove("off");
  resetTeclado();

  const conv = convs.find(c => c._id === convId);
  const otro = conv?.otro || {};

  const avHdr = otro.avatarTipo === "video"
    ? `<video src="${otro.avatar||''}" class="hdr-av" autoplay loop muted playsinline onclick="ir('profile.html?handle=${esc(otro.handle)}')"></video>`
    : `<img src="${otro.avatar||getDefaultAv(otro.nombre)}" class="hdr-av" alt="" onclick="ir('profile.html?handle=${esc(otro.handle)}')"/>`;

  chatEl.innerHTML = `
    <div class="chat-hdr">
      <button class="btn-back" onclick="volverALista()"><i class="ri-arrow-left-line"></i></button>
      ${avHdr}
      <div class="hdr-info" onclick="ir('profile.html?handle=${esc(otro.handle)}')">
        <div class="hdr-name">${esc(otro.nombre||"?")}</div>
        <div class="hdr-sub">@${esc(otro.handle||"")}</div>
      </div>
    </div>

    <div class="chat-msgs" id="chatMsgs">
      <div class="msgs-spin">
        <i class="ri-loader-4-line spin" style="font-size:1.4rem;color:var(--green)"></i>
        Cargando mensajes...
      </div>
    </div>

    <div class="typing-row" id="typingRow">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      escribiendo...
    </div>

    <div class="mprev-bar" id="mprevBar"></div>

    <div class="chat-ibar">
      <div class="irow">
        <label for="mediaFInput" class="btn-att" title="Foto/Video">
          <i class="ri-image-add-line"></i>
        </label>
        <input type="file" id="mediaFInput"
               accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm"
               hidden onchange="onMediaSel(this)"/>
        <textarea class="cinput" id="cinput"
                  placeholder="Escribe un mensaje..." rows="1"
                  oninput="autoResize(this);onTyping()"
                  onkeydown="onKD(event)"></textarea>
        <button class="btn-snd" id="btnSnd" onclick="enviar()">
          <i class="ri-send-plane-fill"></i>
        </button>
      </div>
    </div>`;

  await cargarMensajes(convId);
  marcarLeido(convId, false);
  document.getElementById("cinput")?.focus();
}

function volverALista() {
  convActiva = null;
  setTyping(false);
  resetTeclado();
  document.getElementById("convPanel").classList.remove("off");
  document.getElementById("chatPanel").classList.add("off");
}

/* ════════════════════════
   CARGAR MENSAJES
════════════════════════ */
async function cargarMensajes(convId) {
  const box = document.getElementById("chatMsgs");
  if (!box) return;
  try {
    const res = await fetch(`${API}/messages/${convId}?limite=80`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.mensaje||`HTTP ${res.status}`); }
    const msgs = await res.json();
    box.innerHTML = "";
    if (!msgs.length) {
      box.innerHTML = `
        <div style="margin:auto;text-align:center;color:var(--text-3);font-size:.84rem;padding:40px 20px">
          <i class="ri-chat-smile-3-line" style="font-size:2.5rem;display:block;margin-bottom:10px;color:var(--green)"></i>
          Sin mensajes aún. ¡Di hola! 👋
        </div>`;
      return;
    }
    renderMensajes(msgs, box);
    requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; });
  } catch(e) {
    console.error("cargarMensajes:", e);
    box.innerHTML = `<div class="msgs-spin" style="color:var(--red)"><i class="ri-error-warning-line" style="font-size:1.5rem"></i>${esc(e.message)}</div>`;
  }
}

/* ════════════════════════
   RENDER MENSAJES
════════════════════════ */
function renderMensajes(msgs, box) {
  box.innerHTML = "";
  let lastDate = null, lastAutor = null, lastTime = 0;
  msgs.forEach(msg => {
    const mio  = esMio(msg);
    const aId  = getAutorId(msg);
    const dStr = new Date(msg.createdAt).toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"});
    if (dStr !== lastDate) {
      lastDate = dStr; lastAutor = null; lastTime = 0;
      const sep = document.createElement("div");
      sep.className = "date-sep"; sep.textContent = dStr;
      box.appendChild(sep);
    }
    const t     = new Date(msg.createdAt).getTime();
    const mismo = aId === lastAutor && (t - lastTime) < 120000;
    lastAutor = aId; lastTime = t;
    box.appendChild(buildBubble(msg, mio, !mismo && !mio, !mismo));
  });
}

/* ════════════════════════
   BURBUJA
════════════════════════ */
function buildBubble(msg, mio, showAv, gapTop) {
  const autor     = (msg.autor && typeof msg.autor==="object") ? msg.autor : {};
  const textoMsg  = getTexto(msg);
  const mediaUrl  = msg.mediaUrl  || msg.media?.url  || null;
  const mediaTipo = msg.mediaTipo || msg.media?.tipo  || null;

  const wrap = document.createElement("div");
  wrap.className = `mw ${mio?"mine":"theirs"}${gapTop?" gt":""}`;
  wrap.id = `msg-${msg._id}`;

  if (!mio) {
    const isVid = autor.avatarTipo === "video";
    const avEl  = document.createElement(isVid ? "video" : "img");
    avEl.src    = autor.avatar || getDefaultAv(autor.nombre);
    avEl.className = `mav${showAv?"":" hidden-av"}`;
    avEl.alt    = "";
    if (isVid) { avEl.autoplay=true; avEl.loop=true; avEl.muted=true; avEl.setAttribute("playsinline",""); }
    wrap.appendChild(avEl);
  }

  const col = document.createElement("div");
  col.className = "mcol";
  const bbl = document.createElement("div");
  bbl.className = (mediaUrl && !textoMsg) ? "bubble only" : "bubble";

  if (mediaUrl) {
    if (mediaTipo==="video") {
      bbl.innerHTML += `<video src="${mediaUrl}" class="bmedia-vid" controls playsinline onclick="event.stopPropagation()"></video>`;
    } else {
      bbl.innerHTML += `<img src="${mediaUrl}" class="bmedia-img" alt="foto" onclick="verMedia('${mediaUrl}','imagen')"/>`;
    }
  }
  if (textoMsg) {
    const s = document.createElement("span");
    s.textContent = textoMsg;
    bbl.appendChild(s);
  }
  col.appendChild(bbl);

  const meta = document.createElement("div");
  meta.className = "mmeta";
  const hora = document.createElement("span");
  hora.className = "mtime"; hora.textContent = horaFmt(msg.createdAt);
  meta.appendChild(hora);
  if (mio) {
    const st = document.createElement("span");
    st.id = `st-${msg._id}`;
    st.className = `mst${msg.leido?" leido":""}`;
    st.innerHTML = msg.leido ? `<i class="ri-check-double-line"></i> Visto` : `<i class="ri-check-line"></i>`;
    meta.appendChild(st);
  }
  col.appendChild(meta);
  wrap.appendChild(col);
  return wrap;
}

/* ════════════════════════
   ENVIAR
════════════════════════ */
async function enviar() {
  const inp   = document.getElementById("cinput");
  const texto = inp?.value.trim() || "";
  if (!texto && !mediaFile) return;
  if (!convActiva) return;
  const btn = document.getElementById("btnSnd");
  if (btn) btn.disabled = true;
  emitDejoEsc();
  try {
    const fd = new FormData();
    if (texto)     fd.append("texto", texto);
    if (mediaFile) fd.append("media", mediaFile);
    const res  = await fetch(`${API}/messages/${convActiva}`, {
      method:"POST", headers:{Authorization:`Bearer ${token}`}, body:fd
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.mensaje||"Error");
    if (inp) { inp.value=""; inp.style.height="auto"; }
    limpiarPrev();
    appendMsg(data);
    const oid = convs.find(c=>c._id===convActiva)?.otro?._id;
    if (socket?.connected && oid)
      socket.emit("enviarMensaje",{convId:convActiva,mensaje:data,destinatarioId:oid});
    actualizarConvEnLista(convActiva, data);
  } catch(e) {
    alert("Error: " + e.message);
  } finally {
    if (btn) btn.disabled = false;
    inp?.focus();
  }
}

function appendMsg(msg) {
  const box = document.getElementById("chatMsgs");
  if (!box) return;
  box.querySelector("[style*='Sin mensajes']")?.remove();
  box.appendChild(buildBubble(msg, esMio(msg), !esMio(msg), true));
  box.scrollTop = box.scrollHeight;
}

/* ════════════════════════
   LEÍDO
════════════════════════ */
async function marcarLeido(convId, silencioso) {
  try {
    await fetch(`${API}/messages/${convId}/read`,{method:"PUT",headers:{Authorization:`Bearer ${token}`}});
    const b = document.getElementById(`badge-${convId}`);
    if (b) b.style.display = "none";
    document.querySelector(`#ci-${convId} .cprev`)?.classList.remove("unread");
    if (!silencioso && socket?.connected) {
      const oid = convs.find(c=>c._id===convId)?.otro?._id;
      if (oid) socket.emit("mensajesLeidos",{convId,destinatarioId:oid});
    }
  } catch(_) {}
}
function marcarMsgsVisto() {
  document.querySelectorAll("[id^='st-']").forEach(el => {
    el.className = "mst leido";
    el.innerHTML = `<i class="ri-check-double-line"></i> Visto`;
  });
}

/* ════════════════════════
   TYPING
════════════════════════ */
function onTyping() {
  if (!socket?.connected || !convActiva) return;
  const oid = convs.find(c=>c._id===convActiva)?.otro?._id;
  if (!oid) return;
  socket.emit("escribiendo",{convId:convActiva,nombre:yo.nombre,destinatarioId:oid});
  clearTimeout(typingTimer);
  typingTimer = setTimeout(emitDejoEsc, 1800);
}
function emitDejoEsc() {
  if (!socket?.connected || !convActiva) return;
  const oid = convs.find(c=>c._id===convActiva)?.otro?._id;
  if (oid) socket.emit("dejoDeEscribir",{convId:convActiva,destinatarioId:oid});
}
function setTyping(show) {
  const el = document.getElementById("typingRow");
  if (el) el.style.visibility = show ? "visible" : "hidden";
}

/* ════════════════════════
   MEDIA
════════════════════════ */
function onMediaSel(input) {
  const f = input.files[0]; if (!f) return;
  if (f.size > 25*1024*1024) { alert("Máximo 25MB"); input.value=""; return; }
  mediaFile = f;
  const url = URL.createObjectURL(f);
  const bar = document.getElementById("mprevBar"); if (!bar) return;
  bar.classList.add("show");
  bar.innerHTML = `
    <div class="pthumb">
      ${f.type.startsWith("video/")?`<video src="${url}" muted></video>`:`<img src="${url}" alt=""/>`}
      <button class="pthumb-rm" onclick="limpiarPrev()"><i class="ri-close-line"></i></button>
    </div>
    <small>${f.type.startsWith("video/")?"🎥":"📷"} ${(f.size/1024/1024).toFixed(1)}MB</small>`;
}
function limpiarPrev() {
  mediaFile = null;
  const bar = document.getElementById("mprevBar");
  const fi  = document.getElementById("mediaFInput");
  if (bar) { bar.classList.remove("show"); bar.innerHTML=""; }
  if (fi)  fi.value = "";
}
function verMedia(url, tipo) {
  const m = document.getElementById("mmmodal");
  const i = document.getElementById("mminner");
  m.classList.remove("hidden");
  i.innerHTML = tipo==="video"
    ? `<video src="${url}" controls autoplay playsinline onclick="event.stopPropagation()" style="max-width:96vw;max-height:96dvh;border-radius:var(--radius)"></video>`
    : `<img src="${url}" onclick="event.stopPropagation()" alt=""/>`;
}
function cerrarModal() {
  document.getElementById("mmmodal").classList.add("hidden");
  document.getElementById("mminner").innerHTML = "";
}

/* ════════════════════════
   LISTA CONVS
════════════════════════ */
function actualizarConvEnLista(convId, msg) {
  const idx = convs.findIndex(c=>c._id===convId);
  if (idx===-1) return;
  convs[idx].ultimoMensaje = msg;
  if (!esMio(msg)) convs[idx].noLeidos = (convs[idx].noLeidos||0)+1;
  convs.unshift(convs.splice(idx,1)[0]);
  renderConvList(convs);
  document.querySelectorAll(".conv-item").forEach(el =>
    el.classList.toggle("active", el.id===`ci-${convActiva}`)
  );
}
function subirBadge(convId) {
  const b = document.getElementById(`badge-${convId}`);
  if (!b) return;
  b.textContent = String(parseInt(b.textContent||"0")+1);
  b.style.display = "flex";
  document.querySelector(`#ci-${convId} .cprev`)?.classList.add("unread");
}

/* ════════════════════════
   UTILS
════════════════════════ */
function getTexto(msg) {
  for (const f of ["texto","mensaje","content","body","message","contenido","text","msg","msj"]) {
    const v = msg[f];
    if (v && typeof v==="string" && v.trim() && v!=="undefined" && v!=="null") return v.trim();
  }
  return "";
}
function getDefaultAv(nombre="?") {
  const l = (nombre||"?")[0].toUpperCase();
  return `data:image/svg+xml,${encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" rx="20" fill="#1c1c1c"/><text x="20" y="26" text-anchor="middle" font-size="18" font-family="sans-serif" fill="#5cdb6f">${l}</text></svg>`
  )}`;
}
function esMio(msg)      { return getAutorId(msg) === yo._id; }
function getAutorId(msg) { return String(msg.autor?._id ?? msg.autor ?? "").trim(); }
function esc(s="")       { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function horaFmt(f)      { return new Date(f).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}); }
function tiempoCorto(f) {
  const d = (Date.now()-new Date(f))/1000;
  if (d<60)    return "ahora";
  if (d<3600)  return `${Math.floor(d/60)}m`;
  if (d<86400) return `${Math.floor(d/3600)}h`;
  return new Date(f).toLocaleDateString("es",{day:"numeric",month:"short"});
}
function autoResize(el) { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,100)+"px"; }
function onKD(e) { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); enviar(); } }
function ir(url) { window.location.href=url; }

document.addEventListener("keydown", e => { if(e.key==="Escape") cerrarModal(); });
document.getElementById("mmmodal").addEventListener("click", e => { if(e.target.id==="mmmodal") cerrarModal(); });

cargarConversaciones();
</script>
</body>
