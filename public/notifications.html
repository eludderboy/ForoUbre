<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Notificaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/notifications.css"/>
</head>
<body>

<div class="app-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
    <nav>
      <a href="/"                  class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
      <a href="explore.html"       class="nav-item"><span class="nav-icon"><i class="ri-search-line"></i></span><span>Explorar</span></a>
      <a href="videos.html"        class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
      <a href="messages.html"      class="nav-item"><span class="nav-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
      <a href="notifications.html" class="nav-item active"><span class="nav-icon"><i class="ri-notification-4-fill"></i></span><span>Notificaciones</span></a>
      <a href="#" class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    </nav>
    <button class="btn-post-sidebar" onclick="window.location.href='/'">
      <i class="ri-quill-pen-line"></i><span>Nuevo post</span>
    </button>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- ══ FEED ══ -->
  <main class="feed">
    <header class="feed-header">
      <h2><i class="ri-notification-4-fill" style="color:var(--green);vertical-align:middle;margin-right:6px"></i>Notificaciones</h2>
      <button class="btn-leer-todo" id="btnLeerTodo" onclick="leerTodas()">
        <i class="ri-check-double-line"></i> Marcar todas leídas
      </button>
    </header>

    <div class="notif-list" id="notifList">
      <div class="empty-state">
        <i class="ri-loader-4-line spin" style="color:var(--green);font-size:2rem"></i>
        <h3>Cargando...</h3>
      </div>
    </div>
  </main>

  <!-- ══ ASIDE ══ -->
  <aside class="trends">
    <div class="trends-box">
      <h3><i class="ri-fire-line"></i> Tendencias</h3>
      <ul>
        <li><span>#BajoCoRtisol</span><small>1.2K posts</small></li>
        <li><span>#NaulChop</span><small>890 posts</small></li>
        <li><span>#Banana</span><small>540 posts</small></li>
        <li><span>#NaulDespuesDelMerecido</span><small>310 posts</small></li>
      </ul>
    </div>
  </aside>

</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"                  class="nbtn"><span class="bn-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html"       class="nbtn"><span class="bn-icon"><i class="ri-search-line"></i></span><span>Buscar</span></a>
    <a href="videos.html"        class="nbtn"><span class="bn-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html"      class="nbtn"><span class="bn-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
    <a href="notifications.html" class="nbtn active"><span class="bn-icon"><i class="ri-notification-4-fill"></i></span><span>Notifs</span></a>
    <a href="#"                  class="nbtn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<script src="/js/notifications.js"></script>
</body>
</html>
