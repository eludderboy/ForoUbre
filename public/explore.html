<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Explorar</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
    <nav>
      <a href="/"             class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
      <a href="explore.html"  class="nav-item active"><span class="nav-icon"><i class="ri-search-fill"></i></span><span>Explorar</span></a>
      <a href="messages.html" class="nav-item"><span class="nav-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
      <a href="#"             class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    </nav>
    <button class="btn-post-sidebar" onclick="window.location.href='/'">
      <i class="ri-quill-pen-line"></i><span>Nuevo post</span>
    </button>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="feed">
    <header class="feed-header">
      <h2><i class="ri-search-line"></i> Explorar</h2>
    </header>

    <!-- Barra de búsqueda -->
    <div class="explore-search-bar">
      <div class="explore-input-wrap">
        <i class="ri-search-line"></i>
        <input type="text" id="searchInput"
               placeholder="Buscar usuarios, posts..."
               autocomplete="off"/>
        <button class="btn-clear-search hidden" id="btnClearSearch">
          <i class="ri-close-line"></i>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="search-tabs" id="searchTabs">
      <button class="tab-btn active" data-tipo="todo">Todo</button>
      <button class="tab-btn"        data-tipo="usuarios">Usuarios</button>
      <button class="tab-btn"        data-tipo="posts">Posts</button>
    </div>

    <!-- Resultados -->
    <div id="searchResults">
      <div class="explore-placeholder">
        <i class="ri-search-2-line" style="font-size:3rem;color:var(--text-3)"></i>
        <p>Escribe algo para buscar</p>
      </div>
    </div>

  </main>

  <aside class="trends">
    <div class="trends-box">
      <h3><i class="ri-fire-line"></i> Tendencias</h3>
      <ul>
        <li><span>#ForoUbre</span><small>1.2K posts</small></li>
        <li><span>#VacaViral</span><small>890 posts</small></li>
        <li><span>#Leche</span><small>540 posts</small></li>
        <li><span>#MuuuTech</span><small>310 posts</small></li>
      </ul>
    </div>
  </aside>

</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"             class="bottom-nav-btn"><span class="bn-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html"  class="bottom-nav-btn active"><span class="bn-icon"><i class="ri-search-fill"></i></span><span>Explorar</span></a>
    <a href="messages.html" class="bottom-nav-btn"><span class="bn-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
    <a href="#"             class="bottom-nav-btn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<script>
  const API   = "/api";
  const token = localStorage.getItem("fu_token");
  const yo    = JSON.parse(localStorage.getItem("fu_usuario") || "null");
  if (!token || !yo) window.location.href = "/login.html";

  document.getElementById("navPerfil").href = `profile.html?handle=${yo.handle}`;
  document.getElementById("bnPerfil").href  = `profile.html?handle=${yo.handle}`;

  const av = yo.avatarTipo === "video"
    ? `<video src="${yo.avatar}" autoplay loop muted playsinline style="width:38px;height:38px;border-radius:50%;object-fit:cover;"></video>`
    : `<img src="${yo.avatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;" alt=""/>`;
  document.getElementById("sidebarUser").innerHTML = `${av}<div><strong>${escHtml(yo.nombre)}</strong><small>@${escHtml(yo.handle)}</small></div>`;

  let tipoActual = "todo";
  let searchTimer = null;

  // Tabs
  document.querySelectorAll(".search-tabs .tab-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".search-tabs .tab-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      tipoActual = this.dataset.tipo;
      const q = document.getElementById("searchInput").value.trim();
      if (q) buscar(q, tipoActual);
    });
  });

  // Input
  const inp = document.getElementById("searchInput");
  inp.addEventListener("input", function() {
    const clearBtn = document.getElementById("btnClearSearch");
    clearBtn.classList.toggle("hidden", !this.value);
    clearTimeout(searchTimer);
    if (!this.value.trim()) {
      mostrarPlaceholder();
      return;
    }
    searchTimer = setTimeout(() => buscar(this.value.trim(), tipoActual), 400);
  });

  document.getElementById("btnClearSearch").addEventListener("click", () => {
    inp.value = "";
    document.getElementById("btnClearSearch").classList.add("hidden");
    mostrarPlaceholder();
    inp.focus();
  });

  function mostrarPlaceholder() {
    document.getElementById("searchResults").innerHTML = `
      <div class="explore-placeholder">
        <i class="ri-search-2-line" style="font-size:3rem;color:var(--text-3)"></i>
        <p>Escribe algo para buscar</p>
      </div>
    `;
  }

  async function buscar(q, tipo) {
    const box = document.getElementById("searchResults");
    box.innerHTML = `<div class="loading"><i class="ri-loader-4-line spin"></i> Buscando...</div>`;

    try {
      const res  = await fetch(`${API}/search?q=${encodeURIComponent(q)}&tipo=${tipo}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      let html = "";

      if (data.usuarios?.length > 0 && (tipo === "todo" || tipo === "usuarios")) {
        html += `<div class="search-section-title"><i class="ri-user-3-line"></i> Usuarios</div>`;
        html += data.usuarios.map(u => {
          const marcoStyle = getMarcoStyle(u.personalizacion);
          const avHTML = u.avatarTipo === "video"
            ? `<video src="${u.avatar}" autoplay loop muted playsinline style="width:46px;height:46px;border-radius:50%;object-fit:cover;${marcoStyle}"></video>`
            : `<img src="${u.avatar}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;${marcoStyle}" alt=""/>`;
          return `
            <div class="search-user-result" onclick="window.location.href='profile.html?handle=${escHtml(u.handle)}'">
              <div style="flex-shrink:0">${avHTML}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:4px">
                  ${renderNombreHTML(u)}
                </div>
                <small style="color:var(--text-3)">@${escHtml(u.handle)}</small>
                ${u.bio ? `<p style="font-size:.8rem;color:var(--text-2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(u.bio)}</p>` : ""}
              </div>
              <button class="btn-follow-search ${u.sigues ? 'siguiendo' : ''}"
                      onclick="event.stopPropagation();toggleFollowSearch(this,'${u._id}')">
                ${u.sigues
                  ? `<i class="ri-user-follow-line"></i> Siguiendo`
                  : `<i class="ri-user-add-line"></i> Seguir`}
              </button>
            </div>
          `;
        }).join("");
      }

      if (data.posts?.length > 0 && (tipo === "todo" || tipo === "posts")) {
        html += `<div class="search-section-title"><i class="ri-article-line"></i> Posts</div>`;
        html += data.posts.map(p => {
          const marcoStyle = getMarcoStyle(p.autor.personalizacion);
          const avHTML = p.autor.avatarTipo === "video"
            ? `<video src="${p.autor.avatar}" autoplay loop muted playsinline style="width:42px;height:42px;border-radius:50%;object-fit:cover;${marcoStyle}"></video>`
            : `<img src="${p.autor.avatar}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;${marcoStyle}" alt=""/>`;
          const img = p.imagen
            ? `<img src="${p.imagen}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:8px" loading="lazy"/>`
            : "";
          return `
            <div class="post-card" onclick="window.location.href='profile.html?handle=${escHtml(p.autor.handle)}'">
              ${avHTML}
              <div class="post-body">
                <div class="post-user">
                  ${renderNombreHTML(p.autor)}
                  <span class="handle">@${escHtml(p.autor.handle)}</span>
                  <span class="post-time">· ${tiempoRelativo(p.createdAt)}</span>
                </div>
                ${p.texto ? `<p class="post-text">${escHtml(p.texto)}</p>` : ""}
                ${img}
                <div class="post-footer">
                  <span class="post-btn"><i class="ri-heart-line"></i> ${p.totalLikes}</span>
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      if (!html) {
        html = `
          <div class="explore-placeholder">
            <i class="ri-search-eye-line" style="font-size:3rem;color:var(--text-3)"></i>
            <p>Sin resultados para "<strong>${escHtml(q)}</strong>"</p>
          </div>
        `;
      }

      box.innerHTML = html;
    } catch(e) {
      box.innerHTML = `<div class="loading" style="color:var(--red)"><i class="ri-error-warning-line"></i> Error al buscar</div>`;
    }
  }

  async function toggleFollowSearch(btn, userId) {
    try {
      const res  = await fetch(`${API}/profile/${userId}/follow`, {
        method: "POST", headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      btn.className = `btn-follow-search ${data.sigues ? "siguiendo" : ""}`;
      btn.innerHTML = data.sigues
        ? `<i class="ri-user-follow-line"></i> Siguiendo`
        : `<i class="ri-user-add-line"></i> Seguir`;
    } catch(e) {}
  }

  // Helpers
  function getMarcoStyle(p) {
    if (!p || p.marco === "none" || !p.marco) return "";
    if (p.marco === "color") return `box-shadow:0 0 0 2.5px ${p.marcoColor};`;
    if (p.marco === "neon")  return `box-shadow:0 0 0 2px ${p.marcoColor},0 0 10px ${p.marcoColor};`;
    if (p.marco === "gold")  return `box-shadow:0 0 0 2.5px #ffd43b;`;
    if (p.marco === "dashed") return `outline:2px dashed ${p.marcoColor};outline-offset:2px;`;
    return "";
  }

  function renderNombreHTML(autor) {
    const p = autor.personalizacion || {};
    const badges = {
      verified: `<i class="ri-verified-badge-fill" style="color:#4dabf7;font-size:.85em;margin-left:2px"></i>`,
      star:     `<i class="ri-star-fill" style="color:#ffd43b;font-size:.85em;margin-left:2px"></i>`,
      fire:     `<i class="ri-fire-fill" style="color:#ff6b35;font-size:.85em;margin-left:2px"></i>`,
      crown:    `<i class="ri-vip-crown-fill" style="color:#ffd43b;font-size:.85em;margin-left:2px"></i>`,
      dev:      `<i class="ri-code-box-fill" style="color:#69db7c;font-size:.85em;margin-left:2px"></i>`,
      vip:      `<span style="background:linear-gradient(90deg,#ffd43b,#ff6b35);color:#050505;font-size:.55em;padding:1px 5px;border-radius:4px;margin-left:3px;font-weight:900;vertical-align:middle">VIP</span>`,
      new:      `<span style="background:var(--green);color:#050505;font-size:.55em;padding:1px 5px;border-radius:4px;margin-left:3px;font-weight:900;vertical-align:middle">NEW</span>`
    };
    const badgeHTML = p.badge && p.badge !== "none" ? (badges[p.badge] || "") : "";

    let style = "font-weight:700;font-size:.92rem;";
    const ef  = p.nombreEfecto || "none";
    const grads = {
      "green-blue": "linear-gradient(90deg,#5cdb6f,#4dabf7)",
      "fire":       "linear-gradient(90deg,#ff6b35,#ffd43b)",
      "purple":     "linear-gradient(90deg,#cc5de8,#845ef7)",
      "sunset":     "linear-gradient(90deg,#ff6b6b,#feca57)",
      "ocean":      "linear-gradient(90deg,#54a0ff,#5f27cd)",
      "custom":     `linear-gradient(90deg,${p.gradColor1||'#5cdb6f'},${p.gradColor2||'#4dabf7'})`
    };

    if (ef === "gradient") {
      const g = grads[p.nombreGradiente || "green-blue"];
      style = `font-weight:700;font-size:.92rem;background:${g};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    } else if (ef === "glow") {
      style += `color:${p.nombreColor||'var(--green)'};text-shadow:0 0 10px ${p.nombreColor||'var(--green)'};`;
    } else if (ef === "neon") {
      style += `color:${p.nombreColor||'#fff'};text-shadow:0 0 7px ${p.nombreColor||'var(--green)'},0 0 20px ${p.nombreColor||'var(--green)'};`;
    } else if (ef === "color") {
      style += `color:${p.nombreColor||'inherit'};`;
    } else if (ef === "shadow") {
      style += `text-shadow:2px 2px 4px rgba(0,0,0,.9);`;
    }

    return `<strong style="${style}">${escHtml(autor.nombre)}</strong>${badgeHTML}`;
  }

  function escHtml(s = "") {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function tiempoRelativo(f) {
    const d = (Date.now()-new Date(f))/1000;
    if(d<60)    return "ahora";
    if(d<3600)  return `${Math.floor(d/60)}m`;
    if(d<86400) return `${Math.floor(d/3600)}h`;
    return new Date(f).toLocaleDateString("es",{day:"numeric",month:"short"});
  }
</script>

<style>
  .explore-search-bar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 56px; z-index: 40;
    background: rgba(8,8,8,.9);
    backdrop-filter: blur(20px);
  }
  .explore-input-wrap {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: var(--radius-full);
    padding: 10px 16px;
    transition: all var(--transition);
  }
  .explore-input-wrap:focus-within {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-subtle);
  }
  .explore-input-wrap i { color: var(--text-3); font-size: 1rem; flex-shrink: 0; }
  .explore-input-wrap input {
    flex: 1; background: none; border: none; color: var(--text);
    font-size: .95rem; outline: none;
  }
  .explore-input-wrap input::placeholder { color: var(--text-3); }
  .btn-clear-search {
    background: none; border: none; color: var(--text-3);
    cursor: pointer; font-size: 1rem; transition: color var(--transition);
  }
  .btn-clear-search:hover { color: var(--text); }
  .search-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    position: sticky; top: calc(56px + 61px); z-index: 39;
    background: rgba(8,8,8,.9); backdrop-filter: blur(12px);
  }
  .explore-placeholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 64px 20px; gap: 12px;
    color: var(--text-3); text-align: center;
  }
  .explore-placeholder p { font-size: .9rem; }
  .search-section-title {
    padding: 12px 20px 6px; font-size: .75rem; font-weight: 800;
    color: var(--text-3); letter-spacing: .5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .search-user-result {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background var(--transition);
  }
  .search-user-result:hover { background: var(--surface); }
  .btn-follow-search {
    background: var(--text); color: var(--bg); border: 1px solid transparent;
    padding: 6px 14px; border-radius: var(--radius-full);
    font-size: .78rem; font-weight: 700; cursor: pointer;
    transition: all var(--transition); flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-follow-search:hover { background: #d0d0d0; }
  .btn-follow-search.siguiendo {
    background: transparent; border-color: var(--border-2); color: var(--text);
  }
  .btn-follow-search.siguiendo:hover { border-color: var(--red); color: var(--red); background: var(--red-subtle); }
  .spin { display: inline-block; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
