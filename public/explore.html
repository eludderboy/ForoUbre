<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Explorar</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/index.css"/>
  <link rel="stylesheet" href="/css/explore.css"/>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="logo"><i class="ri-leaf-fill"></i><span>Foro Ubre</span></div>
    <nav>
      <a href="/"            class="nav-item"><span class="nav-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
      <a href="explore.html" class="nav-item active"><span class="nav-icon"><i class="ri-search-fill"></i></span><span>Explorar</span></a>
      <a href="videos.html"  class="nav-item"><span class="nav-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
      <a href="messages.html"class="nav-item"><span class="nav-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
      <a href="#"            class="nav-item" id="navPerfil"><span class="nav-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
    </nav>
    <button class="btn-post-sidebar" onclick="window.location.href='/'">
      <i class="ri-quill-pen-line"></i><span>Nuevo post</span>
    </button>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="feed">
    <header class="feed-header">
      <h2><i class="ri-search-line"></i> Explorar</h2>
    </header>

    <div class="explore-search-bar">
      <div class="explore-input-wrap">
        <i class="ri-search-line"></i>
        <input type="text" id="searchInput"
               placeholder="Buscar usuarios, posts..."
               autocomplete="off"/>
        <button class="btn-clear-search hidden" id="btnClearSearch">
          <i class="ri-close-line"></i>
        </button>
      </div>
    </div>

    <div class="search-tabs" id="searchTabs">
      <button class="tab-btn active" data-tipo="todo">Todo</button>
      <button class="tab-btn"        data-tipo="usuarios">Usuarios</button>
      <button class="tab-btn"        data-tipo="posts">Posts</button>
    </div>

    <div id="searchResults">
      <div class="explore-placeholder">
        <i class="ri-search-2-line" style="font-size:3rem;color:var(--text-3)"></i>
        <p>Escribe algo para buscar</p>
      </div>
    </div>
  </main>

  <aside class="trends">
    <div class="trends-box">
      <h3><i class="ri-fire-line"></i> Tendencias</h3>
      <ul>
        <li><span>#Bajo Cortisol</span><small>1.2K posts</small></li>
        <li><span>#NaulChop</span><small>890 posts</small></li>
        <li><span>#Banana</span><small>540 posts</small></li>
        <li><span>#NaulDespuesDelMerecido</span><small>310 posts</small></li>
      </ul>
    </div>
  </aside>

</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"            class="bottom-nav-btn"><span class="bn-icon"><i class="ri-home-5-line"></i></span><span>Inicio</span></a>
    <a href="explore.html" class="bottom-nav-btn active"><span class="bn-icon"><i class="ri-search-fill"></i></span><span>Explorar</span></a>
    <a href="videos.html"  class="bottom-nav-btn"><span class="bn-icon"><i class="ri-video-line"></i></span><span>Videos</span></a>
    <a href="messages.html"class="bottom-nav-btn"><span class="bn-icon"><i class="ri-message-3-line"></i></span><span>Mensajes</span></a>
    <a href="#"            class="bottom-nav-btn" id="bnPerfil"><span class="bn-icon"><i class="ri-user-3-line"></i></span><span>Perfil</span></a>
  </div>
</nav>

<script src="/js/explore.js"></script>
</body>
</html>
