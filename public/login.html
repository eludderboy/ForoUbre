<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foro Ubre — Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-container">

    <div class="auth-logo">
      <i class="ri-leaf-fill" style="color:var(--green)"></i>
      Foro Ubre
    </div>

    <h2>Bienvenido de vuelta</h2>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label><i class="ri-mail-line"></i> Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label><i class="ri-lock-line"></i> Contraseña</label>
        <div class="input-password-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="btn-toggle-pass" id="btnTogglePass" tabindex="-1">
            <i class="ri-eye-line" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div id="errorMsg" class="error-msg hidden">
        <i class="ri-error-warning-line"></i>
        <span id="errorText"></span>
      </div>

      <button type="submit" class="btn-auth" id="btnLogin">
        <i class="ri-login-box-line"></i>
        Iniciar sesión
      </button>

    </form>

    <p class="auth-switch">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </p>

  </div>

  <script>
    if (localStorage.getItem("fu_token")) window.location.href = "/";

    // Toggle password
    document.getElementById("btnTogglePass").addEventListener("click", () => {
      const inp  = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      if (inp.type === "password") {
        inp.type       = "text";
        icon.className = "ri-eye-off-line";
      } else {
        inp.type       = "password";
        icon.className = "ri-eye-line";
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn     = document.getElementById("btnLogin");
      const errBox  = document.getElementById("errorMsg");
      const errText = document.getElementById("errorText");

      errBox.classList.add("hidden");
      btn.innerHTML = '<i class="ri-loader-4-line spin"></i> Entrando...';
      btn.disabled  = true;

      try {
        const res  = await fetch("/api/auth/login", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            email:    document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.mensaje);

        localStorage.setItem("fu_token",   data.token);
        localStorage.setItem("fu_usuario", JSON.stringify(data.usuario));
        window.location.href = "/";

      } catch (err) {
        errText.textContent = err.message;
        errBox.classList.remove("hidden");
        btn.innerHTML = '<i class="ri-login-box-line"></i> Iniciar sesión';
        btn.disabled  = false;
      }
    });
  </script>

  <style>
    .input-password-wrap {
      position: relative;
    }
    .input-password-wrap input {
      padding-right: 44px;
    }
    .btn-toggle-pass {
      position:   absolute;
      right:      12px;
      top:        50%;
      transform:  translateY(-50%);
      background: none;
      border:     none;
      color:      var(--text-3);
      font-size:  1rem;
      cursor:     pointer;
      transition: color var(--transition);
      padding:    4px;
    }
    .btn-toggle-pass:hover { color: var(--text); }
    .error-msg { display: flex; align-items: center; gap: 8px; }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

</body>
</html>
